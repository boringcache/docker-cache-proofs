---
name: Docker case benchmark
description: Run one Docker cache backend benchmark inside a single visible job.
inputs:
  strategy:
    required: true
  cache_lane:
    required: false
    default: fresh
  buildkit_image:
    description: Managed BoringCache BuildKit image.
    required: false
    default: ghcr.io/boringcache/buildkit:v0.30.0-bc
  benchmark_id:
    required: true
  cache_id:
    description: Cache namespace used for cache keys/tags. Defaults to benchmark_id; investigation workflows can set a stable cache_id while using a distinct benchmark_id for artifacts.
    required: false
    default: ''
  runner_label:
    description: GitHub Actions runner label for Docker build jobs.
    required: false
    default: ubuntu-latest
  cache_scope_suffix:
    description: Optional suffix appended to rolling cache scopes for investigation lanes.
    required: false
    default: ''
  project_repo:
    required: true
  project_ref:
    required: true
  case_id:
    required: true
  case_ref_key:
    required: true
  dockerfile_path:
    required: false
    default: ".work/source/Dockerfile"
  docker_context:
    required: false
    default: ".work/source"
  image_tag:
    required: true
  docker_build_extra_args:
    required: false
    default: ''
  docker_tool_cache:
    description: Comma- or newline-separated Docker tool-cache entries such as sccache:kvrocks-cpp. When set, the benchmark uses `boringcache docker --tool-cache` so the CLI can inject the BuildKit secret into the wrapped build.
    required: false
    default: ''
  build_output:
    description: Image output mode for UX parity. none measures cache-only build; local-registry pushes to a temporary local registry.
    required: false
    default: none
  cli_platform:
    required: false
    default: linux-amd64
  cli_version:
    description: Optional BoringCache CLI release tag. Canary runs can pass vcli-canary.
    required: false
    default: ''
  benchmark_workspace:
    required: false
    default: ''
  free_disk_space:
    description: Reclaim runner disk before the Docker build. Useful for large real-world Docker images that can exhaust hosted-runner space mid-build.
    required: false
    default: 'false'
  setup_qemu:
    description: Register QEMU binfmt handlers for an upstream multi-platform build.
    required: false
    default: 'false'
runs:
  using: composite
  steps:
  - name: Validate strategy
    env:
      STRATEGY: "${{ inputs.strategy }}"
    run: |
      case "$STRATEGY" in
        actions-cache|boringcache) ;;
        *) echo "Unknown Docker benchmark strategy: $STRATEGY" >&2; exit 1 ;;
      esac
    shell: bash
  - name: Free disk space
    if: "${{ inputs.free_disk_space == 'true' }}"
    run: |
      required_gb="${BORINGCACHE_MIN_FREE_DISK_GB:-45}"
      available_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
      required_kb=$((required_gb * 1024 * 1024))
      if (( available_kb >= required_kb )); then
        echo "Free disk is already at least ${required_gb}GiB; skipping cleanup."
        df -h /
        docker system df || true
        exit 0
      fi
      echo "Free disk below ${required_gb}GiB; reclaiming hosted-runner tool caches."
      sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
      sudo docker system prune --all --volumes --force
      df -h /
      docker system df || true
    shell: bash
  - name: Validate BoringCache secrets
    if: "${{ inputs.strategy == 'boringcache' }}"
    env:
      BORINGCACHE_RESTORE_TOKEN: "${{ env.BORINGCACHE_RESTORE_TOKEN }}"
      BORINGCACHE_SAVE_TOKEN: "${{ env.BORINGCACHE_SAVE_TOKEN }}"
    run: |
      set -euo pipefail
      if [[ -z "${BORINGCACHE_RESTORE_TOKEN}" ]]; then
        echo "Missing BORINGCACHE_RESTORE_TOKEN secret" >&2
        exit 1
      fi
      if [[ -z "${BORINGCACHE_SAVE_TOKEN}" ]]; then
        echo "Missing BORINGCACHE_SAVE_TOKEN secret" >&2
        exit 1
      fi
    shell: bash
  - name: Log in to private GHCR images
    if: "${{ startsWith(inputs.buildkit_image, 'ghcr.io/') }}"
    uses: docker/login-action@v4.2.0
    with:
      registry: ghcr.io
      username: "${{ env.BORINGCACHE_GHCR_READ_USER || github.actor }}"
      password: "${{ env.BORINGCACHE_GHCR_READ_TOKEN || github.token }}"
  - name: Install BoringCache CLI with boringcache/one
    if: "${{ inputs.strategy == 'boringcache' }}"
    uses: boringcache/one@58df2c0d6884ecd5e430feeeaf7e477656864771 # v1.13.102
    with:
      setup: none
      mode: archive
      workspace: "${{ env.BENCHMARK_WORKSPACE }}"
      cli-version: "${{ inputs.cli_version }}"
      cli-platform: "${{ inputs.cli_platform }}"
      cache-runtime: false
  - name: Checkout benchmark repo
    uses: actions/checkout@v6
    with:
      fetch-depth: 1
      submodules: false
  - name: Prepare pinned case source tree
    run: ./scripts/prepare-case-source.sh "$CASE_ID" "$CASE_REF_KEY"
    shell: bash
  - name: Set up QEMU for upstream multi-platform build
    if: "${{ inputs.setup_qemu == 'true' }}"
    uses: docker/setup-qemu-action@v3
  - name: Start local registry for push emulation
    if: "${{ inputs.build_output == 'local-registry' }}"
    run: |
      set -euo pipefail

      # The registry is a test dependency, so keep it supervised for the full
      # solve instead of letting a process or Docker daemon restart turn a
      # successful build into an unrelated image-export failure.
      docker rm -f cache-proof-registry >/dev/null 2>&1 || true
      docker run -d \
        --restart=always \
        -p 5001:5000 \
        --name cache-proof-registry \
        registry:2

      for attempt in {1..30}; do
        if curl --fail --silent --show-error http://127.0.0.1:5001/v2/ >/dev/null; then
          exit 0
        fi
        sleep 1
      done

      docker ps -a --filter name=cache-proof-registry
      docker logs cache-proof-registry || true
      echo "Local registry did not become ready" >&2
      exit 1
    shell: bash
  - name: Start build timing
    id: build_timing_start
    run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
    shell: bash
  - name: Prepare benchmark scope
    id: scope
    env:
      CACHE_SCOPE_SUFFIX: ${{ inputs.cache_scope_suffix }}
    run: |
      set -euo pipefail
      ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
      ref_slug="${ref_slug#-}"
      ref_slug="${ref_slug%-}"
      ref_slug="${ref_slug:-main}"
      scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"

      if [[ "$CACHE_LANE" == "rolling" ]]; then
        run_suffix="rolling-${ref_slug}${CACHE_SCOPE_SUFFIX}"
      else
        run_suffix="r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
      fi

      if [[ "${{ inputs.strategy }}" == "boringcache" ]]; then
        cache_scope="${CACHE_ID}-run-${run_suffix}"
        tags_csv="${cache_scope}"
        echo "cache_scope=${cache_scope}" >> "$GITHUB_OUTPUT"
        echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"
      else
        if [[ "$CACHE_LANE" == "rolling" ]]; then
          cache_scope_primary="${CACHE_ID}-rolling-${ref_slug}${CACHE_SCOPE_SUFFIX}"
          cache_scope_fallback="${CACHE_ID}-rolling-${ref_slug}${CACHE_SCOPE_SUFFIX}-fallback"
        else
          cache_scope_primary="${CACHE_ID}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}-s1"
          cache_scope_fallback="${CACHE_ID}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}-s2"
        fi
        echo "cache_scope_primary=${cache_scope_primary}" >> "$GITHUB_OUTPUT"
        echo "cache_scope_fallback=${cache_scope_fallback}" >> "$GITHUB_OUTPUT"
      fi
    shell: bash
  - name: Set up Docker Buildx
    if: "${{ inputs.strategy == 'actions-cache' }}"
    id: buildx
    uses: docker/setup-buildx-action@v4
    with:
      driver-opts: |
        image=${{ inputs.buildkit_image }}
        network=host
  - name: Expose GitHub runtime for Buildx cache
    if: "${{ inputs.strategy == 'actions-cache' }}"
    uses: crazy-max/ghaction-github-runtime@v4
  - name: Prepare GitHub Actions Cache write probe
    if: "${{ inputs.strategy == 'actions-cache' }}"
    run: |
      set -euo pipefail
      mkdir -p .bench-cache-probe
      printf '%s\n' "probe-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(date +%s)" > .bench-cache-probe/probe.txt
    shell: bash
  - name: Verify GitHub Actions Cache write access
    if: "${{ inputs.strategy == 'actions-cache' }}"
    id: cache_write_probe
    continue-on-error: true
    uses: actions/cache/save@v5
    with:
      path: .bench-cache-probe
      key: ac-${{ inputs.benchmark_id }}-write-probe-r${{ github.run_id }}-a${{ github.run_attempt }}
  - name: Fail early if GitHub Actions Cache is read-only
    if: "${{ inputs.strategy == 'actions-cache' && steps.cache_write_probe.outcome != 'success' }}"
    run: |
      echo "GitHub Actions Cache write probe failed (likely read-only budget/spending cap)." >&2
      echo "Cannot produce reliable GitHub Actions Cache benchmark results until cache writes are enabled." >&2
      exit 1
    shell: bash
  - name: "${{ inputs.cache_lane == 'rolling' && 'Run rolling commit build' || 'Run fresh cold build' }}"
    id: measured_build
    env:
      BORINGCACHE_RESTORE_TOKEN: "${{ env.BORINGCACHE_RESTORE_TOKEN }}"
      BORINGCACHE_SAVE_TOKEN: "${{ env.BORINGCACHE_SAVE_TOKEN }}"
      BUILDER: "${{ steps.buildx.outputs.name || '' }}"
      BORINGCACHE_MANAGED_BUILDKIT_IMAGE: "${{ inputs.buildkit_image }}"
      BUILDKIT_IMAGE: "${{ inputs.buildkit_image }}"
      CACHE_SCOPE: "${{ steps.scope.outputs.cache_scope }}"
      CACHE_SCOPE_PRIMARY: "${{ steps.scope.outputs.cache_scope_primary }}"
      CACHE_SCOPE_FALLBACK: "${{ steps.scope.outputs.cache_scope_fallback }}"
      BORINGCACHE_OBSERVABILITY_JSONL_PATH: "${{ runner.temp }}/${{ inputs.benchmark_id }}-boringcache-build-observability.jsonl"
      ALLOW_BORINGCACHE_ROLLING_BOOTSTRAP: "${{ inputs.cache_lane == 'rolling' && 'true' || '' }}"
      IMAGE_TAG: "${{ inputs.image_tag }}"
      DOCKERFILE_PATH: "${{ inputs.dockerfile_path }}"
      BENCHMARK_DOCKER_CONTEXT: "${{ inputs.docker_context }}"
      DOCKER_TOOL_CACHE: "${{ inputs.docker_tool_cache }}"
      GITHUB_TOKEN: "${{ env.GITHUB_TOKEN }}"
    run: |
      set -euo pipefail

      if [[ "${{ inputs.strategy }}" == "boringcache" ]]; then
        metrics_file="${RUNNER_TEMP}/cold-build-metrics.env"
        diagnostics_file="benchmark-diagnostics/${BENCHMARK_ID}-boringcache-${CACHE_LANE}-build.txt"
        observability_artifact="benchmark-diagnostics/${BENCHMARK_ID}-boringcache-${CACHE_LANE}-build-observability.jsonl"
        rm -f "$metrics_file"
        rm -f "$diagnostics_file"
        rm -f "$observability_artifact"
        mkdir -p "$(dirname "$diagnostics_file")"
        phase_start="${{ steps.build_timing_start.outputs.started_at }}"
        start="$(date +%s)"
        set +e
        benchmark_script="./scripts/run-boringcache-buildkit-benchmark.sh"
        BENCHMARK_METRICS_OUTPUT="$metrics_file" BENCHMARK_DIAGNOSTICS_OUTPUT="$diagnostics_file" "$benchmark_script" ${{ inputs.cache_lane }}
        status="$?"
        set -e
        end="$(date +%s)"
        if [[ -s "$diagnostics_file" ]]; then
          {
            echo "build_phase_started_at=${phase_start}"
            echo "build_started_at=${start}"
            echo "build_finished_at=${end}"
            echo "build_phase_wall_seconds=$((end - phase_start))"
            echo "build_wall_seconds=$((end - start))"
          } >> "$diagnostics_file"
        fi
        if [[ -s "$BORINGCACHE_OBSERVABILITY_JSONL_PATH" ]]; then
          cp "$BORINGCACHE_OBSERVABILITY_JSONL_PATH" "$observability_artifact"
          mkdir -p benchmark-session-summary
          jq -c 'select(.operation == "cache_session_summary") | .summary // .details // .' "$BORINGCACHE_OBSERVABILITY_JSONL_PATH" 2>/dev/null | tail -n 1 > benchmark-session-summary/benchmark-session-summary.json || true
          if [[ ! -s benchmark-session-summary/benchmark-session-summary.json ]]; then
            rm -f benchmark-session-summary/benchmark-session-summary.json
          fi
        fi
        if [[ "$status" -ne 0 ]]; then
          exit "$status"
        fi
        echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
        echo "build_seconds=$((end - start))" >> "$GITHUB_OUTPUT"
        if [[ -s "$metrics_file" ]]; then
          cat "$metrics_file" >> "$GITHUB_OUTPUT"
          sccache_stats_file="$(grep "^sccache_stats_file=" "$metrics_file" | head -n1 | cut -d= -f2- || true)"
          if [[ -n "$sccache_stats_file" && -s "$sccache_stats_file" ]]; then
            mkdir -p benchmark-native-tool
            cp "$sccache_stats_file" benchmark-native-tool/sccache-stats.txt
          fi
        fi
      else
        build_log="$(mktemp /tmp/${BENCHMARK_ID}-ac-build.XXXXXX.log)"
        find_step_id() {
          local pattern="$1"
          sed -nE "s/^#([0-9]+) ${pattern}.*/\\1/p" "$build_log" | tail -n1
        }
        find_step_seconds() {
          local step_id="$1"
          [[ -n "$step_id" ]] || return 0
          sed -nE "s/^#${step_id} DONE ([0-9]+(\\.[0-9]+)?)s$/\\1/p" "$build_log" | tail -n1
        }

        selected_scope="$CACHE_SCOPE_PRIMARY"
        phase_start="${{ steps.build_timing_start.outputs.started_at }}"
        start="$(date +%s)"
        attempt=1
        while true; do
          extra_args=()
          output_args=()
          if [[ -n "${DOCKER_TOOL_CACHE:-}" ]]; then
            neutral_tool_cache_env="${RUNNER_TEMP}/neutral-boringcache-tool-cache.env"
            printf '# Neutral tool-cache env for non-BoringCache controls.\n' > "$neutral_tool_cache_env"
            extra_args+=(--secret "id=boringcache-tool-cache-env,src=${neutral_tool_cache_env}")
          fi
          while IFS= read -r arg; do
            [[ -n "$arg" ]] || continue
            extra_args+=("$arg")
          done <<< "${DOCKER_BUILD_EXTRA_ARGS:-}"
          case "${BENCHMARK_BUILD_OUTPUT:-none}" in
            none)
              ;;
            load)
              output_args+=(--load)
              ;;
            local-registry)
              output_args+=(--push)
              ;;
            *)
              echo "Unknown BENCHMARK_BUILD_OUTPUT: ${BENCHMARK_BUILD_OUTPUT}" >&2
              exit 1
              ;;
          esac
          if [[ "$CACHE_LANE" == "rolling" ]]; then
            build_cache_args=(
              --cache-from "type=gha,scope=${selected_scope}"
              --cache-to "type=gha,mode=max,scope=${selected_scope}"
            )
          else
            build_cache_args=(
              --no-cache
              --cache-to "type=gha,mode=max,scope=${selected_scope}"
            )
          fi
          : > "$build_log"
          set +e
          DOCKER_BUILDKIT=1 docker buildx build \
            --builder "$BUILDER" \
            --file ${{ inputs.dockerfile_path }} \
            --tag ${{ inputs.image_tag }} \
            --progress=plain \
            "${extra_args[@]}" \
            "${build_cache_args[@]}" \
            "${output_args[@]}" \
            ${{ inputs.docker_context }} 2>&1 | tee "$build_log"
          status=${PIPESTATUS[0]}
          set -e

          if [[ "$status" -eq 0 ]]; then
            break
          fi

          if [[ "$attempt" -ge 2 ]]; then
            echo "Docker build failed after retry" >&2
            exit "$status"
          fi

          attempt=$((attempt + 1))
          if [[ "$attempt" -eq 2 ]]; then
            selected_scope="$CACHE_SCOPE_FALLBACK"
            echo "Retrying cold build with fallback cache scope: ${selected_scope}"
          fi
          sleep 5
        done

        export_verified=0
        for _ in $(seq 1 20); do
          response="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100&key=index-${selected_scope}" 2>/dev/null || true)"
          if [[ -n "$response" ]] && jq -e '.actions_caches | type == "array"' <<<"$response" >/dev/null 2>&1; then
            matches="$(jq '.actions_caches | length' <<<"$response")"
            if [[ "$matches" -gt 0 ]]; then
              export_verified=1
              break
            fi
          fi
          sleep 3
        done

        if [[ "$export_verified" -ne 1 ]]; then
          echo "Docker cache export probe failed: no index cache entry was touched for index-${selected_scope}" >&2
          exit 1
        fi

        end="$(date +%s)"
        echo "cache_scope=${selected_scope}" >> "$GITHUB_OUTPUT"
        echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
        echo "build_seconds=$((end - start))" >> "$GITHUB_OUTPUT"
        import_step="$(find_step_id "importing cache manifest from")"
        import_seconds="$(find_step_seconds "$import_step")"
        if [[ -n "$import_seconds" ]]; then
          echo "docker_cache_import_seconds=${import_seconds}" >> "$GITHUB_OUTPUT"
        fi
        export_step="$(find_step_id "preparing build cache for export")"
        export_seconds="$(find_step_seconds "$export_step")"
        if [[ -n "$export_seconds" ]]; then
          echo "docker_cache_export_seconds=${export_seconds}" >> "$GITHUB_OUTPUT"
        fi
        cached_steps="$(grep -Ec '^#[0-9]+ CACHED$' "$build_log" || true)"
        echo "buildkit_cached_steps=${cached_steps}" >> "$GITHUB_OUTPUT"
      fi
    shell: bash
  - name: Capture local registry diagnostics
    if: "${{ inputs.build_output == 'local-registry' && always() }}"
    run: |
      set -euo pipefail
      mkdir -p benchmark-diagnostics
      {
        echo '## docker ps'
        docker ps -a --filter name=cache-proof-registry || true
        echo
        echo '## docker inspect'
        docker inspect cache-proof-registry || true
        echo
        echo '## registry logs'
        docker logs cache-proof-registry || true
        echo
        echo '## registry readiness'
        curl --fail --silent --show-error http://127.0.0.1:5001/v2/ || true
      } > benchmark-diagnostics/local-registry.txt 2>&1
    shell: bash
  - name: Upload build diagnostics
    if: "${{ inputs.strategy == 'boringcache' && always() }}"
    uses: actions/upload-artifact@v6
    with:
      name: benchmark-diagnostics-${{ inputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
      path: benchmark-diagnostics/*
      if-no-files-found: ignore
  - name: Upload local registry diagnostics
    if: "${{ inputs.build_output == 'local-registry' && always() }}"
    uses: actions/upload-artifact@v6
    with:
      name: benchmark-local-registry-${{ inputs.benchmark_id }}-${{ inputs.strategy }}-${{ inputs.cache_lane }}
      path: benchmark-diagnostics/local-registry.txt
      if-no-files-found: error
  - name: Upload BoringCache session summary
    if: "${{ inputs.strategy == 'boringcache' && always() }}"
    uses: actions/upload-artifact@v6
    with:
      name: benchmark-session-summary-${{ inputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
      path: benchmark-session-summary/benchmark-session-summary.json
      if-no-files-found: ignore
  - name: Upload Docker tool-cache stats
    if: "${{ inputs.strategy == 'boringcache' && inputs.docker_tool_cache != '' && always() }}"
    uses: actions/upload-artifact@v6
    with:
      name: benchmark-native-tool-${{ inputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
      path: benchmark-native-tool/
      if-no-files-found: ignore
  - name: Checkout benchmark repo helpers
    uses: actions/checkout@v6
    with:
      fetch-depth: 1
      path: .benchmark-config
  - name: Install BoringCache CLI with boringcache/one
    if: "${{ inputs.strategy == 'boringcache' }}"
    uses: boringcache/one@58df2c0d6884ecd5e430feeeaf7e477656864771 # v1.13.102
    with:
      setup: none
      mode: archive
      workspace: "${{ env.BENCHMARK_WORKSPACE }}"
      cli-version: "${{ inputs.cli_version }}"
      cli-platform: "${{ inputs.cli_platform }}"
      cache-runtime: false
  - name: Measure BoringCache storage usage
    if: "${{ inputs.strategy == 'boringcache' }}"
    id: bc_cache_size
    env:
      BORINGCACHE_RESTORE_TOKEN: "${{ env.BORINGCACHE_RESTORE_TOKEN || env.BORINGCACHE_API_TOKEN }}"
    run: |
      tags_csv="${{ steps.scope.outputs.tags_csv }}"
      mkdir -p benchmark-storage
      breakdown_path="benchmark-storage/boringcache-storage-breakdown.json"
      bytes="$(BORINGCACHE_STORAGE_BREAKDOWN_PATH="$breakdown_path" .benchmark-config/scripts/sum-boringcache-check-sizes.sh "$BENCHMARK_WORKSPACE" "$tags_csv")"
      echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"
      echo "breakdown_path=${breakdown_path}" >> "$GITHUB_OUTPUT"
    shell: bash
  - name: Measure GitHub Actions Cache storage usage
    if: "${{ inputs.strategy == 'actions-cache' }}"
    id: ac_cache_size
    env:
      GITHUB_TOKEN: "${{ env.GITHUB_TOKEN }}"
    run: |
      bytes="$(.benchmark-config/scripts/sum-gha-cache-by-key.sh --docker-repo-total "$BENCHMARK_ID" "${{ steps.scope.outputs.scope_started_at }}")"
      echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"
    shell: bash
  - name: Capture pinned upstream ref
    id: upstream_ref
    run: echo "sha=${PROJECT_REF}" >> "$GITHUB_OUTPUT"
    shell: bash
  - name: Normalize benchmark fields
    id: normalize
    env:
      STRATEGY: "${{ inputs.strategy }}"
      CACHE_LANE: "${{ inputs.cache_lane }}"
      MEASURED_SECONDS: "${{ steps.measured_build.outputs.seconds }}"
      MEASURED_BUILD_SECONDS: "${{ steps.measured_build.outputs.build_seconds }}"
      MEASURED_DOCKER_EXPORT_SECONDS: "${{ steps.measured_build.outputs.docker_cache_export_seconds }}"
      MEASURED_DOCKER_IMPORT_SECONDS: "${{ steps.measured_build.outputs.docker_cache_import_seconds }}"
      MEASURED_BUILDKIT_CACHED_STEPS: "${{ steps.measured_build.outputs.buildkit_cached_steps }}"
      MEASURED_CACHE_IMPORT_STATUS: "${{ steps.measured_build.outputs.cache_import_status }}"
      MEASURED_OCI_HYDRATION_POLICY: "${{ steps.measured_build.outputs.oci_hydration_policy }}"
      MEASURED_OCI_BODY_LOCAL_HITS: "${{ steps.measured_build.outputs.oci_body_local_hits }}"
      MEASURED_OCI_BODY_REMOTE_FETCHES: "${{ steps.measured_build.outputs.oci_body_remote_fetches }}"
      MEASURED_OCI_BODY_LOCAL_BYTES: "${{ steps.measured_build.outputs.oci_body_local_bytes }}"
      MEASURED_OCI_BODY_REMOTE_BYTES: "${{ steps.measured_build.outputs.oci_body_remote_bytes }}"
      MEASURED_OCI_BODY_LOCAL_DURATION_MS: "${{ steps.measured_build.outputs.oci_body_local_duration_ms }}"
      MEASURED_OCI_BODY_REMOTE_DURATION_MS: "${{ steps.measured_build.outputs.oci_body_remote_duration_ms }}"
      MEASURED_STARTUP_OCI_BODY_INSERTED: "${{ steps.measured_build.outputs.startup_oci_body_inserted }}"
      MEASURED_STARTUP_OCI_BODY_FAILURES: "${{ steps.measured_build.outputs.startup_oci_body_failures }}"
      MEASURED_STARTUP_OCI_BODY_COLD_BLOBS: "${{ steps.measured_build.outputs.startup_oci_body_cold_blobs }}"
      MEASURED_STARTUP_OCI_BODY_DURATION_MS: "${{ steps.measured_build.outputs.startup_oci_body_duration_ms }}"
      MEASURED_OCI_NEW_BLOB_COUNT: "${{ steps.measured_build.outputs.oci_new_blob_count }}"
      MEASURED_OCI_NEW_BLOB_BYTES: "${{ steps.measured_build.outputs.oci_new_blob_bytes }}"
      MEASURED_OCI_UPLOAD_REQUESTED_BLOBS: "${{ steps.measured_build.outputs.oci_upload_requested_blobs }}"
      MEASURED_OCI_UPLOAD_ALREADY_PRESENT: "${{ steps.measured_build.outputs.oci_upload_already_present }}"
      MEASURED_OCI_UPLOAD_BATCH_SECONDS: "${{ steps.measured_build.outputs.oci_upload_batch_seconds }}"
      BC_BYTES: "${{ steps.bc_cache_size.outputs.bytes }}"
      BC_STORAGE_BREAKDOWN_PATH: "${{ steps.bc_cache_size.outputs.breakdown_path }}"
      AC_BYTES: "${{ steps.ac_cache_size.outputs.bytes }}"
    run: |
      set -euo pipefail

      require() {
        local name="$1"
        local value="$2"
        if [[ -z "$value" ]]; then
          echo "Required field '${name}' is empty for strategy=${STRATEGY} lane=${CACHE_LANE}" >&2
          exit 1
        fi
      }

      emit() {
        local key="$1"
        local value="$2"
        echo "${key}=${value}" >> "$GITHUB_OUTPUT"
      }

      require cold_seconds "$MEASURED_SECONDS"
      emit cold_seconds "$MEASURED_SECONDS"
      emit cold_build_seconds "$MEASURED_BUILD_SECONDS"
      emit docker_cache_export_seconds "$MEASURED_DOCKER_EXPORT_SECONDS"

      if [[ "$CACHE_LANE" == "rolling" ]]; then
        emit docker_cache_import_seconds "$MEASURED_DOCKER_IMPORT_SECONDS"
        emit buildkit_cached_steps "$MEASURED_BUILDKIT_CACHED_STEPS"
      else
        emit docker_cache_import_seconds ""
        emit buildkit_cached_steps ""
      fi

      if [[ "$STRATEGY" == "boringcache" ]]; then
        if [[ "$CACHE_LANE" == "rolling" ]]; then
          cache_import_status="$MEASURED_CACHE_IMPORT_STATUS"
          oci_hydration_policy="$MEASURED_OCI_HYDRATION_POLICY"
          oci_body_local_hits="$MEASURED_OCI_BODY_LOCAL_HITS"
          oci_body_remote_fetches="$MEASURED_OCI_BODY_REMOTE_FETCHES"
          oci_body_local_bytes="$MEASURED_OCI_BODY_LOCAL_BYTES"
          oci_body_remote_bytes="$MEASURED_OCI_BODY_REMOTE_BYTES"
          oci_body_local_duration_ms="$MEASURED_OCI_BODY_LOCAL_DURATION_MS"
          oci_body_remote_duration_ms="$MEASURED_OCI_BODY_REMOTE_DURATION_MS"
          startup_oci_body_inserted="$MEASURED_STARTUP_OCI_BODY_INSERTED"
          startup_oci_body_failures="$MEASURED_STARTUP_OCI_BODY_FAILURES"
          startup_oci_body_cold_blobs="$MEASURED_STARTUP_OCI_BODY_COLD_BLOBS"
          startup_oci_body_duration_ms="$MEASURED_STARTUP_OCI_BODY_DURATION_MS"
        else
          cache_import_status=""
          oci_hydration_policy="$MEASURED_OCI_HYDRATION_POLICY"
          oci_body_local_hits="$MEASURED_OCI_BODY_LOCAL_HITS"
          oci_body_remote_fetches="$MEASURED_OCI_BODY_REMOTE_FETCHES"
          oci_body_local_bytes="$MEASURED_OCI_BODY_LOCAL_BYTES"
          oci_body_remote_bytes="$MEASURED_OCI_BODY_REMOTE_BYTES"
          oci_body_local_duration_ms="$MEASURED_OCI_BODY_LOCAL_DURATION_MS"
          oci_body_remote_duration_ms="$MEASURED_OCI_BODY_REMOTE_DURATION_MS"
          startup_oci_body_inserted="$MEASURED_STARTUP_OCI_BODY_INSERTED"
          startup_oci_body_failures="$MEASURED_STARTUP_OCI_BODY_FAILURES"
          startup_oci_body_cold_blobs="$MEASURED_STARTUP_OCI_BODY_COLD_BLOBS"
          startup_oci_body_duration_ms="$MEASURED_STARTUP_OCI_BODY_DURATION_MS"
        fi

        emit cache_import_status "$cache_import_status"
        emit oci_hydration_policy "$oci_hydration_policy"
        emit oci_body_local_hits "$oci_body_local_hits"
        emit oci_body_remote_fetches "$oci_body_remote_fetches"
        emit oci_body_local_bytes "$oci_body_local_bytes"
        emit oci_body_remote_bytes "$oci_body_remote_bytes"
        emit oci_body_local_duration_ms "$oci_body_local_duration_ms"
        emit oci_body_remote_duration_ms "$oci_body_remote_duration_ms"
        emit startup_oci_body_inserted "$startup_oci_body_inserted"
        emit startup_oci_body_failures "$startup_oci_body_failures"
        emit startup_oci_body_cold_blobs "$startup_oci_body_cold_blobs"
        emit startup_oci_body_duration_ms "$startup_oci_body_duration_ms"
        emit oci_new_blob_count "$MEASURED_OCI_NEW_BLOB_COUNT"
        emit oci_new_blob_bytes "$MEASURED_OCI_NEW_BLOB_BYTES"
        emit oci_upload_requested_blobs "$MEASURED_OCI_UPLOAD_REQUESTED_BLOBS"
        emit oci_upload_already_present "$MEASURED_OCI_UPLOAD_ALREADY_PRESENT"
        emit oci_upload_batch_seconds "$MEASURED_OCI_UPLOAD_BATCH_SECONDS"

        require cache_storage_bytes "$BC_BYTES"
        emit cache_storage_bytes "$BC_BYTES"
        emit cache_storage_source "boringcache-check"
        emit cache_storage_breakdown_json "$BC_STORAGE_BREAKDOWN_PATH"
        emit bytes_uploaded "$BC_BYTES"

        if [[ "$CACHE_LANE" == "rolling" ]]; then
          emit hit_behavior_note "Rolling lane: one continuous-commit build imports the prior managed BuildKit cache, updates it, and records that commit build only."
        else
          emit hit_behavior_note "Fresh lane: one cold build starts from a run-scoped BoringCache Docker namespace, uses --no-cache while exporting cache for storage accounting, and records that build only. No second build runs inside this job."
        fi
      elif [[ "$STRATEGY" == "actions-cache" ]]; then
        emit cache_import_status ""
        emit oci_hydration_policy ""
        emit oci_body_local_hits ""
        emit oci_body_remote_fetches ""
        emit oci_body_local_bytes ""
        emit oci_body_remote_bytes ""
        emit oci_body_local_duration_ms ""
        emit oci_body_remote_duration_ms ""
        emit startup_oci_body_inserted ""
        emit startup_oci_body_failures ""
        emit startup_oci_body_cold_blobs ""
        emit startup_oci_body_duration_ms ""
        emit oci_new_blob_count ""
        emit oci_new_blob_bytes ""
        emit oci_upload_requested_blobs ""
        emit oci_upload_already_present ""
        emit oci_upload_batch_seconds ""

        require cache_storage_bytes "$AC_BYTES"
        emit cache_storage_bytes "$AC_BYTES"
        emit cache_storage_source "github-actions-cache-api"
        emit cache_storage_breakdown_json ""
        emit bytes_uploaded ""

        if [[ "$CACHE_LANE" == "rolling" ]]; then
          emit hit_behavior_note "Rolling lane: one continuous-commit build imports the prior GitHub Actions cache, exports the updated cache, and records that commit build only."
        else
          emit hit_behavior_note "Fresh lane: one cold build runs the pinned base tree with --no-cache while exporting cache for storage accounting, and records that build only. No second build runs inside this job."
        fi
      else
        echo "Unknown strategy: ${STRATEGY}" >&2
        exit 1
      fi
    shell: bash
  - name: Write benchmark artifacts
    id: artifact_files
    env:
      BORINGCACHE_API_TOKEN: "${{ env.BORINGCACHE_API_TOKEN || env.BORINGCACHE_RESTORE_TOKEN }}"
      BENCHMARK_CLI_VERSION: "${{ inputs.cli_version }}"
      BENCHMARK_ACTION_REF: boringcache/one@58df2c0d6884ecd5e430feeeaf7e477656864771
    run: |
      cache_summary_args=()
      if [[ -s benchmark-session-summary/benchmark-session-summary.json ]]; then
        cache_summary_args=(--cache-session-summary-json benchmark-session-summary/benchmark-session-summary.json)
      fi
      native_tool_args=()
      if [[ -s benchmark-native-tool/sccache-stats.txt ]]; then
        native_tool_args=(--native-tool sccache --sccache-stats-file benchmark-native-tool/sccache-stats.txt)
      elif [[ -s benchmark-native-tool/native-tool.json ]]; then
        native_tool_args=(--native-tool-evidence-json benchmark-native-tool/native-tool.json)
      fi

      .benchmark-config/scripts/write-benchmark-artifacts.sh \
        --benchmark "$BENCHMARK_ID" \
        --strategy "${{ inputs.strategy }}" \
        --lane "$CACHE_LANE" \
        --mode docker \
        --adapter buildkit \
        --project-repo "$PROJECT_REPO" \
        --project-ref "${{ steps.upstream_ref.outputs.sha }}" \
        --cold-seconds "${{ steps.normalize.outputs.cold_seconds }}" \
        --cold-build-seconds "${{ steps.normalize.outputs.cold_build_seconds }}" \
        --cache-import-status "${{ steps.normalize.outputs.cache_import_status }}" \
        --docker-cache-import-seconds "${{ steps.normalize.outputs.docker_cache_import_seconds }}" \
        --docker-cache-export-seconds "${{ steps.normalize.outputs.docker_cache_export_seconds }}" \
        --buildkit-cached-steps "${{ steps.normalize.outputs.buildkit_cached_steps }}" \
        --cache-storage-bytes "${{ steps.normalize.outputs.cache_storage_bytes }}" \
        --cache-storage-source "${{ steps.normalize.outputs.cache_storage_source }}" \
        --storage-breakdown-json "${{ steps.normalize.outputs.cache_storage_breakdown_json }}" \
        --bytes-uploaded "${{ steps.normalize.outputs.bytes_uploaded }}" \
        --oci-hydration-policy "${{ steps.normalize.outputs.oci_hydration_policy }}" \
        --oci-body-local-hits "${{ steps.normalize.outputs.oci_body_local_hits }}" \
        --oci-body-remote-fetches "${{ steps.normalize.outputs.oci_body_remote_fetches }}" \
        --oci-body-local-bytes "${{ steps.normalize.outputs.oci_body_local_bytes }}" \
        --oci-body-remote-bytes "${{ steps.normalize.outputs.oci_body_remote_bytes }}" \
        --oci-body-local-duration-ms "${{ steps.normalize.outputs.oci_body_local_duration_ms }}" \
        --oci-body-remote-duration-ms "${{ steps.normalize.outputs.oci_body_remote_duration_ms }}" \
        --startup-oci-body-inserted "${{ steps.normalize.outputs.startup_oci_body_inserted }}" \
        --startup-oci-body-failures "${{ steps.normalize.outputs.startup_oci_body_failures }}" \
        --startup-oci-body-cold-blobs "${{ steps.normalize.outputs.startup_oci_body_cold_blobs }}" \
        --startup-oci-body-duration-ms "${{ steps.normalize.outputs.startup_oci_body_duration_ms }}" \
        --oci-new-blob-count "${{ steps.normalize.outputs.oci_new_blob_count }}" \
        --oci-new-blob-bytes "${{ steps.normalize.outputs.oci_new_blob_bytes }}" \
        --oci-upload-requested-blobs "${{ steps.normalize.outputs.oci_upload_requested_blobs }}" \
        --oci-upload-already-present "${{ steps.normalize.outputs.oci_upload_already_present }}" \
        --oci-upload-batch-seconds "${{ steps.normalize.outputs.oci_upload_batch_seconds }}" \
        --hit-behavior-note "${{ steps.normalize.outputs.hit_behavior_note }}" \
        --artifact-surface "single-phase-proof" \
        "${cache_summary_args[@]}" \
        "${native_tool_args[@]}"
    shell: bash
  - name: Upload benchmark artifacts
    uses: actions/upload-artifact@v6
    with:
      name: benchmark-${{ inputs.benchmark_id }}-${{ inputs.strategy }}-${{ inputs.cache_lane }}
      path: |
        ${{ steps.artifact_files.outputs.json_path }}
        ${{ steps.artifact_files.outputs.md_path }}
      if-no-files-found: error
  - name: Publish summary
    run: cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"
    shell: bash
  - name: Storage comparison with GitHub Actions Cache
    if: "${{ inputs.strategy == 'boringcache' && always() && steps.bc_cache_size.outputs.bytes }}"
    env:
      GITHUB_TOKEN: "${{ env.GITHUB_TOKEN }}"
    run: |
      bc_bytes="${{ steps.bc_cache_size.outputs.bytes }}"

      # Query GitHub Actions Cache usage for this repo
      gha_bytes="$(gh api "repos/${GITHUB_REPOSITORY}/actions/cache/usage" --jq '.active_caches_size_in_bytes' 2>/dev/null)" || {
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "_Storage comparison skipped (GitHub Actions Cache API unreachable)_" >> "$GITHUB_STEP_SUMMARY"
        exit 0
      }

      echo "" >> "$GITHUB_STEP_SUMMARY"
      echo "### Storage comparison" >> "$GITHUB_STEP_SUMMARY"
      echo "" >> "$GITHUB_STEP_SUMMARY"
      echo "| Cache | Storage | Notes |" >> "$GITHUB_STEP_SUMMARY"
      echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
      echo "| BoringCache | $(numfmt --to=iec-i --suffix=B "${bc_bytes}") | ${{ inputs.benchmark_id }} benchmark tags (content-addressed, deduped across branches) |" >> "$GITHUB_STEP_SUMMARY"
      echo "| GitHub Actions | $(numfmt --to=iec-i --suffix=B "${gha_bytes}") | Repo total (buildkit blobs shared across projects, no cross-branch dedup) |" >> "$GITHUB_STEP_SUMMARY"
    shell: bash
