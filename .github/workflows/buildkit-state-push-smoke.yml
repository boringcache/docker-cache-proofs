name: BuildKit State Push Smoke
run-name: ${{ format('State push smoke | {0}', inputs.cli_version) }}

on:
  workflow_dispatch:
    inputs:
      cli_version:
        description: Exact immutable CLI canary tag
        required: true
        type: string
        default: vcli-canary-accad696b8c0
      managed_buildkit_image:
        description: Exact managed BuildKit digest ref
        required: true
        type: string
        default: ghcr.io/boringcache/buildkit@sha256:cfcc50779c981fa63ef4818e6744adfa642cc5fd00b60539def3458862739510

permissions:
  contents: read
  packages: write

concurrency:
  group: buildkit-state-push-smoke
  cancel-in-progress: false

jobs:
  push:
    name: Push and verify before state post
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BORINGCACHE_API_URL: https://api.boringcache.com
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
      BORINGCACHE_BUILD_MAX_ATTEMPTS: "1"
      IMAGE_REPOSITORY: ghcr.io/boringcache/docker-cache-proofs-state-smoke
    steps:
      - name: Checkout proof repo
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Record build start
        id: timing
        shell: bash
        run: |
          set -euo pipefail
          echo "started_ms=$(date +%s%3N)" >> "$GITHUB_OUTPUT"
          echo "image_tag=run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Build and push with persistent BuildKit state
        uses: boringcache/one@one-canary-a2a1e9c7f82d
        env:
          BORINGCACHE_BUILDKIT_MOUNTCACHE_OFFLOADER: "1"
          BORINGCACHE_REQUIRE_SERVER_SIGNATURE: "1"
        with:
          setup: none
          mode: docker
          workspace: boringcache/docker-cache-proof
          cli-version: ${{ inputs.cli_version }}
          cli-platform: linux-amd64
          cache-runtime: "false"
          cache-backend: state
          managed-buildkit-image: ${{ inputs.managed_buildkit_image }}
          cache-tag: state-push-smoke-amd64
          context: fixtures/state-push-smoke
          dockerfile: Dockerfile
          image: ${{ env.IMAGE_REPOSITORY }}
          tags: ${{ steps.timing.outputs.image_tag }}
          platforms: linux/amd64
          load: "false"
          push: "true"
          provenance: "false"
          proxy-no-git: "true"
          proxy-no-platform: "true"
          no-platform: "true"
          save-policy: auto
          fail-on-cache-error: "true"
          verify: wait
          verify-require-server-signature: "true"
          diagnostics: summary
          diagnostics-artifact-name: ${{ format('state-push-smoke-r{0}-a{1}', github.run_id, github.run_attempt) }}
          diagnostics-artifact-retention-days: "14"
          metadata-hints: benchmark=state-push-smoke,phase=push

      - name: Verify pushed image before state post
        id: verify
        shell: bash
        env:
          STARTED_MS: ${{ steps.timing.outputs.started_ms }}
          IMAGE_TAG: ${{ steps.timing.outputs.image_tag }}
        run: |
          set -euo pipefail
          image_ref="${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker buildx imagetools inspect "$image_ref"
          ready_ms="$(date +%s%3N)"
          elapsed_ms=$((ready_ms - STARTED_MS))
          {
            echo "image_ref=$image_ref"
            echo "image_ready_ms=$ready_ms"
            echo "image_ready_elapsed_ms=$elapsed_ms"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### State push smoke"
            echo
            echo "- Image: \`$image_ref\`"
            echo "- Registry verified before Action post: yes"
            echo "- Build start to registry verification: $((elapsed_ms / 1000))s"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Exercise downstream work while state finalizes
        shell: bash
        run: sleep 20
