name: "Canary Docker Proof Dispatch"

on:
  workflow_dispatch:
    inputs:
      candidate_file:
        description: Candidate file to dispatch.
        required: false
        type: string
        default: .canary/candidates.txt
      cli_version:
        description: Canary BoringCache CLI release tag.
        required: false
        type: string
        default: vcli-canary
      prewarm_buildkit_image:
        description: Canary BuildKit image for the managed BuildKit backend lane.
        required: false
        type: string
        default: ""
      build_output:
        description: Default image output mode for candidates that do not specify one.
        required: false
        type: choice
        default: none
        options:
          - none
          - load
          - local-registry
  push:
    branches:
      - route-rescue-canary
      - '*canary*'
      - 'canary/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  dispatch:
    name: Dispatch canary Docker proofs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout canary config
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Dispatch canary Docker proofs
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATES_FILE: ${{ inputs.candidate_file || '.canary/candidates.txt' }}
          CLI_VERSION: ${{ inputs.cli_version || vars.DOCKER_CACHE_PROOFS_CANARY_CLI_VERSION || vars.BORINGCACHE_BENCHMARK_CLI_VERSION || 'vcli-canary' }}
          PREWARM_BUILDKIT_IMAGE: ${{ inputs.prewarm_buildkit_image || vars.DOCKER_CACHE_PROOFS_PREWARM_BUILDKIT_IMAGE || 'ghcr.io/boringcache/buildkit:canary' }}
          DEFAULT_BUILD_OUTPUT: ${{ inputs.build_output || 'none' }}
        run: |
          set -euo pipefail

          wait_for_cli_release() {
            local cli_version="$1"
            [[ -n "$cli_version" ]] || return 0

            local release_repo="${BORINGCACHE_CLI_RELEASE_REPOSITORY:-boringcache/cli}"
            local max_attempts="${BORINGCACHE_CLI_RELEASE_WAIT_ATTEMPTS:-60}"
            local attempt assets
            for attempt in $(seq 1 "$max_attempts"); do
              assets="$(gh release view "$cli_version" --repo "$release_repo" --json assets --jq '.assets[].name' 2>/dev/null || true)"
              if grep -Fxq boringcache-linux-amd64 <<< "$assets" && grep -Fxq SHA256SUMS <<< "$assets"; then
                echo "Found ${release_repo}@${cli_version} canary assets."
                return 0
              fi
              echo "::notice::Waiting for ${release_repo}@${cli_version} boringcache-linux-amd64 and SHA256SUMS (${attempt}/${max_attempts})"
              sleep 10
            done

            echo "::error::Timed out waiting for ${release_repo}@${cli_version} boringcache-linux-amd64 and SHA256SUMS." >&2
            exit 1
          }

          wait_for_cli_release "$CLI_VERSION"

          candidates_file="${CANDIDATES_FILE}"
          if [[ ! -f "$candidates_file" ]]; then
            echo "No ${candidates_file} found; nothing to dispatch." >&2
            exit 0
          fi

          # Each non-comment line: <case_id> <ref_key> <cache_lane> [build_output]
          while IFS= read -r line; do
            line="${line%%#*}"
            line="$(echo "$line" | xargs || true)"
            [[ -z "$line" ]] && continue
            read -r case_id ref_key cache_lane build_output <<< "$line"
            : "${cache_lane:=fresh}"
            : "${build_output:=${DEFAULT_BUILD_OUTPUT}}"
            echo "Dispatching case=${case_id} ref=${ref_key} lane=${cache_lane} output=${build_output}"
            if [[ "$cache_lane" == "rolling" ]]; then
              echo "::notice::Rolling candidates are dispatched asynchronously. Run rolling after a prior warm sample if you need a real cache-import measurement; otherwise it will bootstrap like a fresh sample."
            fi

            attempt=1
            max_attempts=3
            until gh workflow run docker-cache-proofs.yml \
              --repo "$GITHUB_REPOSITORY" \
              --ref "${{ github.ref_name }}" \
              -f case_id="$case_id" \
              -f ref_key="$ref_key" \
              -f cache_lane="$cache_lane" \
              -f build_output="$build_output" \
              -f prewarm_buildkit_image="$PREWARM_BUILDKIT_IMAGE" \
              -f cli_version="$CLI_VERSION"; do
              if [[ "$attempt" -ge "$max_attempts" ]]; then
                echo "Failed to dispatch ${case_id} after ${attempt} attempts" >&2
                exit 1
              fi
              echo "Dispatch failed; retrying (${attempt}/${max_attempts})" >&2
              attempt=$((attempt + 1))
              sleep 5
            done
          done < "$candidates_file"
