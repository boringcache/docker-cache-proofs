name: Docker Cache Proof
run-name: >-
  ${{ format('{0} | {1} | {2} | output={3}', inputs.case_id, inputs.ref_key, inputs.cache_lane, inputs.build_output) }}

on:
  workflow_dispatch:
    inputs:
      case_id:
        description: Case to run
        required: true
        type: choice
        options:
          - phentrieve-api
          - wormhole-solana
          - cardstack-realm-server
          - dependabot-updater-core
          - iggy-rust-server
          - iggy-rust-server-sccache
          - kvrocks-docker
          - kvrocks-docker-sccache
          - nmisp-nightly
      ref_key:
        description: Pinned case ref
        required: true
        type: string
        default: main
      cache_lane:
        description: Benchmark lane
        required: true
        type: choice
        default: fresh
        options:
          - fresh
          - rolling
      build_output:
        description: Image output mode
        required: true
        type: choice
        default: none
        options:
          - none
          - load
          - local-registry
      prewarm_buildkit_image:
        description: "Optional experimental BuildKit image for the BoringCache backend lane."
        required: false
        type: string
        default: ""
      cli_version:
        description: "Optional BoringCache CLI release tag for canary benchmark dispatches, for example vcli-canary."
        required: false
        type: string
        default: ""
      cache_scope_suffix:
        description: "Optional isolated suffix for a controlled seed/rolling series."
        required: false
        type: string
        default: ""
      lane_filter:
        description: "Run the full comparison or only the BoringCache BuildKit backend lane."
        required: true
        type: choice
        default: all
        options:
          - all
          - buildkit
permissions:
  contents: read
  actions: write
  id-token: write
  packages: read

jobs:
  case:
    name: Resolve
    runs-on: ubuntu-latest
    outputs:
      case_id: ${{ steps.case.outputs.case_id }}
      case_ref_key: ${{ steps.case.outputs.case_ref_key }}
      benchmark_id: ${{ steps.case.outputs.benchmark_id }}
      cache_id: ${{ steps.case.outputs.cache_id }}
      project_repo: ${{ steps.case.outputs.project_repo }}
      project_ref: ${{ steps.case.outputs.project_ref }}
      dockerfile_path: ${{ steps.case.outputs.dockerfile_path }}
      docker_context: ${{ steps.case.outputs.docker_context }}
      image_tag: ${{ steps.case.outputs.image_tag }}
      runner_label: ${{ steps.case.outputs.runner_label }}
      free_disk_space: ${{ steps.case.outputs.free_disk_space }}
      docker_build_extra_args: ${{ steps.case.outputs.docker_build_extra_args }}
      docker_tool_cache: ${{ steps.case.outputs.docker_tool_cache }}
    steps:
      - uses: actions/checkout@v6
      - id: case
        run: ./scripts/emit-case-outputs.sh "${{ inputs.case_id }}" "${{ inputs.ref_key }}" "${{ inputs.build_output }}"

  github-actions-cache:
    name: GHA
    if: ${{ inputs.lane_filter == 'all' }}
    needs: case
    runs-on: ${{ needs.case.outputs.runner_label }}
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PROJECT_REPO: ${{ needs.case.outputs.project_repo }}
      PROJECT_REF: ${{ needs.case.outputs.project_ref }}
      CASE_ID: ${{ needs.case.outputs.case_id }}
      CASE_REF_KEY: ${{ needs.case.outputs.case_ref_key }}
      BENCHMARK_ID: ${{ needs.case.outputs.benchmark_id }}-gha
      CACHE_ID: ${{ needs.case.outputs.cache_id }}
      CACHE_LANE: ${{ inputs.cache_lane }}
      CACHE_SCOPE_SUFFIX: -${{ needs.case.outputs.case_id }}
      DOCKER_BUILD_EXTRA_ARGS: ${{ needs.case.outputs.docker_build_extra_args }}
      BENCHMARK_BUILD_OUTPUT: ${{ inputs.build_output }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        if: ${{ needs.case.outputs.free_disk_space == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          required_gb="${BORINGCACHE_MIN_FREE_DISK_GB:-45}"
          available_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
          required_kb=$((required_gb * 1024 * 1024))
          if (( available_kb >= required_kb )); then
            echo "Free disk is already at least ${required_gb}GiB; skipping cleanup."
            df -h /
            docker system df || true
            exit 0
          fi
          echo "Free disk below ${required_gb}GiB; reclaiming hosted-runner tool caches."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: Run GitHub Actions Cache proof
        uses: ./.github/actions/docker-case-benchmark
        with:
          strategy: actions-cache
          cache_lane: ${{ inputs.cache_lane }}
          benchmark_id: ${{ needs.case.outputs.benchmark_id }}-gha
          cache_id: ${{ needs.case.outputs.cache_id }}
          cache_scope_suffix: ${{ format('-{0}{1}', needs.case.outputs.case_id, inputs.cache_scope_suffix) }}
          case_id: ${{ needs.case.outputs.case_id }}
          case_ref_key: ${{ needs.case.outputs.case_ref_key }}
          project_repo: ${{ needs.case.outputs.project_repo }}
          project_ref: ${{ needs.case.outputs.project_ref }}
          dockerfile_path: ${{ needs.case.outputs.dockerfile_path }}
          docker_context: ${{ needs.case.outputs.docker_context }}
          image_tag: ${{ needs.case.outputs.image_tag }}
          docker_build_extra_args: ${{ needs.case.outputs.docker_build_extra_args }}
          docker_tool_cache: ${{ needs.case.outputs.docker_tool_cache }}
          build_output: ${{ inputs.build_output }}
          runner_label: ${{ needs.case.outputs.runner_label }}

  ecr-cache:
    name: ECR
    if: ${{ inputs.lane_filter == 'all' }}
    needs: case
    runs-on: ${{ needs.case.outputs.runner_label }}
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PROJECT_REPO: ${{ needs.case.outputs.project_repo }}
      PROJECT_REF: ${{ needs.case.outputs.project_ref }}
      CASE_ID: ${{ needs.case.outputs.case_id }}
      CASE_REF_KEY: ${{ needs.case.outputs.case_ref_key }}
      BENCHMARK_ID: ${{ needs.case.outputs.benchmark_id }}-ecr
      CACHE_ID: ${{ needs.case.outputs.cache_id }}
      CACHE_LANE: ${{ inputs.cache_lane }}
      CACHE_SCOPE_SUFFIX: -${{ needs.case.outputs.case_id }}
      DOCKER_BUILD_EXTRA_ARGS: ${{ needs.case.outputs.docker_build_extra_args }}
      BENCHMARK_BUILD_OUTPUT: ${{ inputs.build_output }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        if: ${{ needs.case.outputs.free_disk_space == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          required_gb="${BORINGCACHE_MIN_FREE_DISK_GB:-45}"
          available_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
          required_kb=$((required_gb * 1024 * 1024))
          if (( available_kb >= required_kb )); then
            echo "Free disk is already at least ${required_gb}GiB; skipping cleanup."
            df -h /
            docker system df || true
            exit 0
          fi
          echo "Free disk below ${required_gb}GiB; reclaiming hosted-runner tool caches."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: Run ECR registry cache proof
        uses: ./.github/actions/docker-case-benchmark
        with:
          strategy: ecr-cache
          cache_lane: ${{ inputs.cache_lane }}
          benchmark_id: ${{ needs.case.outputs.benchmark_id }}-ecr
          cache_id: ${{ needs.case.outputs.cache_id }}
          cache_scope_suffix: ${{ format('-{0}{1}', needs.case.outputs.case_id, inputs.cache_scope_suffix) }}
          case_id: ${{ needs.case.outputs.case_id }}
          case_ref_key: ${{ needs.case.outputs.case_ref_key }}
          project_repo: ${{ needs.case.outputs.project_repo }}
          project_ref: ${{ needs.case.outputs.project_ref }}
          dockerfile_path: ${{ needs.case.outputs.dockerfile_path }}
          docker_context: ${{ needs.case.outputs.docker_context }}
          image_tag: ${{ needs.case.outputs.image_tag }}
          docker_build_extra_args: ${{ needs.case.outputs.docker_build_extra_args }}
          docker_tool_cache: ${{ needs.case.outputs.docker_tool_cache }}
          build_output: ${{ inputs.build_output }}
          runner_label: ${{ needs.case.outputs.runner_label }}
          ecr_region: ${{ vars.BENCHMARK_ECR_REGION || 'us-east-1' }}
          ecr_role_arn: ${{ vars.BENCHMARK_ECR_ROLE_ARN }}
          ecr_registry: ${{ vars.BENCHMARK_ECR_REGISTRY }}
          ecr_repository: ${{ vars.BENCHMARK_ECR_REPOSITORY }}

  boringcache-oci:
    name: ${{ needs.case.outputs.docker_tool_cache != '' && 'BC OCI + toolcache' || 'BC OCI' }}
    if: ${{ inputs.lane_filter == 'all' }}
    needs: case
    runs-on: ${{ needs.case.outputs.runner_label }}
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      PROJECT_REPO: ${{ needs.case.outputs.project_repo }}
      PROJECT_REF: ${{ needs.case.outputs.project_ref }}
      CASE_ID: ${{ needs.case.outputs.case_id }}
      CASE_REF_KEY: ${{ needs.case.outputs.case_ref_key }}
      BENCHMARK_ID: ${{ needs.case.outputs.benchmark_id }}-bc-oci
      CACHE_ID: ${{ needs.case.outputs.cache_id }}
      BENCHMARK_WORKSPACE: boringcache/docker-cache-proof
      CACHE_LANE: ${{ inputs.cache_lane }}
      BUILDKIT_BACKEND: registry
      CACHE_SCOPE_SUFFIX: -${{ needs.case.outputs.case_id }}
      DOCKER_BUILD_EXTRA_ARGS: ${{ needs.case.outputs.docker_build_extra_args }}
      BENCHMARK_BUILD_OUTPUT: ${{ inputs.build_output }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        if: ${{ needs.case.outputs.free_disk_space == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          required_gb="${BORINGCACHE_MIN_FREE_DISK_GB:-45}"
          available_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
          required_kb=$((required_gb * 1024 * 1024))
          if (( available_kb >= required_kb )); then
            echo "Free disk is already at least ${required_gb}GiB; skipping cleanup."
            df -h /
            docker system df || true
            exit 0
          fi
          echo "Free disk below ${required_gb}GiB; reclaiming hosted-runner tool caches."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: ${{ needs.case.outputs.docker_tool_cache != '' && 'Run BoringCache OCI + toolcache proof' || 'Run BoringCache OCI proof' }}
        uses: ./.github/actions/docker-case-benchmark
        with:
          strategy: boringcache
          cache_lane: ${{ inputs.cache_lane }}
          benchmark_id: ${{ needs.case.outputs.benchmark_id }}-bc-oci
          cache_id: ${{ needs.case.outputs.cache_id }}
          cache_scope_suffix: ${{ format('-{0}{1}', needs.case.outputs.case_id, inputs.cache_scope_suffix) }}
          case_id: ${{ needs.case.outputs.case_id }}
          case_ref_key: ${{ needs.case.outputs.case_ref_key }}
          project_repo: ${{ needs.case.outputs.project_repo }}
          project_ref: ${{ needs.case.outputs.project_ref }}
          dockerfile_path: ${{ needs.case.outputs.dockerfile_path }}
          docker_context: ${{ needs.case.outputs.docker_context }}
          image_tag: ${{ needs.case.outputs.image_tag }}
          docker_build_extra_args: ${{ needs.case.outputs.docker_build_extra_args }}
          docker_tool_cache: ${{ needs.case.outputs.docker_tool_cache }}
          build_output: ${{ inputs.build_output }}
          runner_label: ${{ needs.case.outputs.runner_label }}
          benchmark_workspace: boringcache/docker-cache-proof

  boringcache-buildkit-backend:
    name: ${{ needs.case.outputs.docker_tool_cache != '' && 'BC BuildKit Backend + toolcache' || 'BC BuildKit Backend' }}
    needs: case
    if: ${{ github.event_name != 'pull_request' && (inputs.prewarm_buildkit_image != '' || vars.DOCKER_CACHE_PROOFS_PREWARM_BUILDKIT_IMAGE != '') }}
    runs-on: ${{ needs.case.outputs.runner_label }}
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
      PROJECT_REPO: ${{ needs.case.outputs.project_repo }}
      PROJECT_REF: ${{ needs.case.outputs.project_ref }}
      CASE_ID: ${{ needs.case.outputs.case_id }}
      CASE_REF_KEY: ${{ needs.case.outputs.case_ref_key }}
      BENCHMARK_ID: ${{ needs.case.outputs.benchmark_id }}-bc-buildkit
      CACHE_ID: ${{ needs.case.outputs.cache_id }}-buildkit
      BENCHMARK_WORKSPACE: boringcache/docker-cache-proof
      CACHE_LANE: ${{ inputs.cache_lane }}
      BUILDKIT_BACKEND: registry
      CACHE_SCOPE_SUFFIX: -${{ needs.case.outputs.case_id }}
      DOCKER_BUILD_EXTRA_ARGS: ${{ needs.case.outputs.docker_build_extra_args }}
      BENCHMARK_BUILD_OUTPUT: ${{ inputs.build_output }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        if: ${{ needs.case.outputs.free_disk_space == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          required_gb="${BORINGCACHE_MIN_FREE_DISK_GB:-45}"
          available_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
          required_kb=$((required_gb * 1024 * 1024))
          if (( available_kb >= required_kb )); then
            echo "Free disk is already at least ${required_gb}GiB; skipping cleanup."
            df -h /
            docker system df || true
            exit 0
          fi
          echo "Free disk below ${required_gb}GiB; reclaiming hosted-runner tool caches."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: ${{ needs.case.outputs.docker_tool_cache != '' && 'Run BoringCache BuildKit Backend + toolcache proof' || 'Run BoringCache BuildKit Backend proof' }}
        uses: ./.github/actions/docker-case-benchmark
        with:
          strategy: boringcache
          cache_lane: ${{ inputs.cache_lane }}
          benchmark_id: ${{ needs.case.outputs.benchmark_id }}-bc-buildkit
          cache_id: ${{ needs.case.outputs.cache_id }}-buildkit
          cache_scope_suffix: ${{ format('-{0}{1}', needs.case.outputs.case_id, inputs.cache_scope_suffix) }}
          case_id: ${{ needs.case.outputs.case_id }}
          case_ref_key: ${{ needs.case.outputs.case_ref_key }}
          project_repo: ${{ needs.case.outputs.project_repo }}
          project_ref: ${{ needs.case.outputs.project_ref }}
          dockerfile_path: ${{ needs.case.outputs.dockerfile_path }}
          docker_context: ${{ needs.case.outputs.docker_context }}
          image_tag: ${{ needs.case.outputs.image_tag }}
          docker_build_extra_args: ${{ needs.case.outputs.docker_build_extra_args }}
          docker_tool_cache: ${{ needs.case.outputs.docker_tool_cache }}
          build_output: ${{ inputs.build_output }}
          runner_label: ${{ needs.case.outputs.runner_label }}
          benchmark_workspace: boringcache/docker-cache-proof
          buildkit_image: ${{ inputs.prewarm_buildkit_image || vars.DOCKER_CACHE_PROOFS_PREWARM_BUILDKIT_IMAGE }}
          buildkit_cache_backend: boringcache
          cli_version: ${{ inputs.cli_version }}
