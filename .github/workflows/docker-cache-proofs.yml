name: Docker Benchmark
run-name: >-
  ${{ format('{0} | {1} | {2} | output={3}', inputs.case_id, inputs.ref_key, inputs.cache_lane, inputs.build_output) }}

on:
  workflow_dispatch:
    inputs:
      case_id:
        description: Case to run
        required: true
        type: choice
        options:
          - phentrieve-api
          - wormhole-solana
          - cardstack-realm-server
          - dependabot-updater-core
          - iggy-rust-server
          - iggy-rust-server-sccache
          - kvrocks-docker
          - kvrocks-docker-sccache
          - nmisp-nightly
          - mozilla-bedrock-release
          - mozilla-fxa-mono
          - pythonitalia-pycon-pretix
          - chatwoot-docker
          - ghostfolio-docker
          - open-webui-ollama
          - auto-mobile-docker
          - supabase-studio
          - prefect-conda
          - teable-community
          - formbricks-web
          - umami-release
          - hoppscotch-backend
          - hoppscotch-backend-arm64
          - typebot-builder
          - stirling-pdf-embedded
          - heyform-community
          - grist-oss
          - openstatus-dashboard
          - openstatus-dashboard-arm64
          - karakeep-aio
          - anythingllm-primary
          - anythingllm-primary-arm64
          - misskey-develop-amd64
          - omninode-runtime
          - vellum-assistant
      ref_key:
        description: Pinned case ref name or exact 40-character source SHA
        required: true
        type: string
        default: main
      cache_lane:
        description: Benchmark lane
        required: true
        type: choice
        default: fresh
        options: [fresh, rolling]
      build_output:
        description: Image output mode
        required: true
        type: choice
        default: none
        options: [none, load, local-registry]
      buildkit_image:
        description: Optional managed BoringCache BuildKit image.
        required: false
        type: string
        default: ""
      cli_version:
        description: Optional BoringCache CLI release tag for canary proofs.
        required: false
        type: string
        default: ""
      cache_scope_suffix:
        description: Optional isolated suffix for a controlled seed/rolling series.
        required: false
        type: string
        default: ""
      lane_filter:
        description: Run the proof pair or only BoringCache.
        required: true
        type: choice
        default: all
        options: [all, buildkit, gha-buildkit]

permissions:
  contents: read
  actions: write
  packages: read

jobs:
  case:
    name: Resolve
    runs-on: ubuntu-latest
    outputs:
      case_id: ${{ steps.case.outputs.case_id }}
      case_ref_key: ${{ steps.case.outputs.case_ref_key }}
      benchmark_id: ${{ steps.case.outputs.benchmark_id }}
      cache_id: ${{ steps.case.outputs.cache_id }}
      project_repo: ${{ steps.case.outputs.project_repo }}
      project_ref: ${{ steps.case.outputs.project_ref }}
      dockerfile_path: ${{ steps.case.outputs.dockerfile_path }}
      docker_context: ${{ steps.case.outputs.docker_context }}
      image_tag: ${{ steps.case.outputs.image_tag }}
      runner_label: ${{ steps.case.outputs.runner_label }}
      cli_platform: ${{ steps.case.outputs.cli_platform }}
      free_disk_space: ${{ steps.case.outputs.free_disk_space }}
      setup_qemu: ${{ steps.case.outputs.setup_qemu }}
      docker_build_extra_args: ${{ steps.case.outputs.docker_build_extra_args }}
      docker_tool_cache: ${{ steps.case.outputs.docker_tool_cache }}
    steps:
      - uses: actions/checkout@v6
      - id: case
        run: ./scripts/emit-case-outputs.sh "${{ inputs.case_id }}" "${{ inputs.ref_key }}" "${{ inputs.build_output }}"

  github-actions-cache:
    name: GHA
    if: ${{ inputs.lane_filter == 'all' || inputs.lane_filter == 'gha-buildkit' }}
    needs: case
    runs-on: ${{ needs.case.outputs.runner_label }}
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PROJECT_REPO: ${{ needs.case.outputs.project_repo }}
      PROJECT_REF: ${{ needs.case.outputs.project_ref }}
      CASE_ID: ${{ needs.case.outputs.case_id }}
      CASE_REF_KEY: ${{ needs.case.outputs.case_ref_key }}
      BENCHMARK_ID: ${{ needs.case.outputs.benchmark_id }}-gha
      CACHE_ID: ${{ needs.case.outputs.cache_id }}
      CACHE_LANE: ${{ inputs.cache_lane }}
      CACHE_SCOPE_SUFFIX: -${{ needs.case.outputs.case_id }}
      DOCKER_BUILD_EXTRA_ARGS: ${{ needs.case.outputs.docker_build_extra_args }}
      BENCHMARK_BUILD_OUTPUT: ${{ inputs.build_output }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
      - name: Free disk space
        if: ${{ needs.case.outputs.free_disk_space == 'true' }}
        run: ./scripts/free-runner-disk.sh
      - name: Run GitHub Actions Cache proof
        uses: ./.github/actions/docker-case-benchmark
        with:
          strategy: actions-cache
          cache_lane: ${{ inputs.cache_lane }}
          benchmark_id: ${{ needs.case.outputs.benchmark_id }}-gha
          cache_id: ${{ needs.case.outputs.cache_id }}
          cache_scope_suffix: ${{ format('-{0}{1}', needs.case.outputs.case_id, inputs.cache_scope_suffix) }}
          case_id: ${{ needs.case.outputs.case_id }}
          case_ref_key: ${{ needs.case.outputs.case_ref_key }}
          project_repo: ${{ needs.case.outputs.project_repo }}
          project_ref: ${{ needs.case.outputs.project_ref }}
          dockerfile_path: ${{ needs.case.outputs.dockerfile_path }}
          docker_context: ${{ needs.case.outputs.docker_context }}
          image_tag: ${{ needs.case.outputs.image_tag }}
          docker_build_extra_args: ${{ needs.case.outputs.docker_build_extra_args }}
          docker_tool_cache: ${{ needs.case.outputs.docker_tool_cache }}
          build_output: ${{ inputs.build_output }}
          runner_label: ${{ needs.case.outputs.runner_label }}
          cli_platform: ${{ needs.case.outputs.cli_platform }}
          setup_qemu: ${{ needs.case.outputs.setup_qemu }}

  boringcache:
    name: ${{ needs.case.outputs.docker_tool_cache != '' && 'BoringCache + toolcache' || 'BoringCache' }}
    needs: case
    runs-on: ${{ needs.case.outputs.runner_label }}
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
      PROJECT_REPO: ${{ needs.case.outputs.project_repo }}
      PROJECT_REF: ${{ needs.case.outputs.project_ref }}
      CASE_ID: ${{ needs.case.outputs.case_id }}
      CASE_REF_KEY: ${{ needs.case.outputs.case_ref_key }}
      BENCHMARK_ID: ${{ needs.case.outputs.benchmark_id }}-bc
      CACHE_ID: ${{ needs.case.outputs.cache_id }}
      BENCHMARK_WORKSPACE: boringcache/docker-cache-proof
      CACHE_LANE: ${{ inputs.cache_lane }}
      CACHE_SCOPE_SUFFIX: -${{ needs.case.outputs.case_id }}
      DOCKER_BUILD_EXTRA_ARGS: ${{ needs.case.outputs.docker_build_extra_args }}
      BENCHMARK_BUILD_OUTPUT: ${{ inputs.build_output }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
      - name: Free disk space
        if: ${{ needs.case.outputs.free_disk_space == 'true' }}
        run: ./scripts/free-runner-disk.sh
      - name: Run managed BoringCache proof
        uses: ./.github/actions/docker-case-benchmark
        with:
          strategy: boringcache
          cache_lane: ${{ inputs.cache_lane }}
          benchmark_id: ${{ needs.case.outputs.benchmark_id }}-bc
          cache_id: ${{ needs.case.outputs.cache_id }}
          cache_scope_suffix: ${{ format('-{0}{1}', needs.case.outputs.case_id, inputs.cache_scope_suffix) }}
          case_id: ${{ needs.case.outputs.case_id }}
          case_ref_key: ${{ needs.case.outputs.case_ref_key }}
          project_repo: ${{ needs.case.outputs.project_repo }}
          project_ref: ${{ needs.case.outputs.project_ref }}
          dockerfile_path: ${{ needs.case.outputs.dockerfile_path }}
          docker_context: ${{ needs.case.outputs.docker_context }}
          image_tag: ${{ needs.case.outputs.image_tag }}
          docker_build_extra_args: ${{ needs.case.outputs.docker_build_extra_args }}
          docker_tool_cache: ${{ needs.case.outputs.docker_tool_cache }}
          build_output: ${{ inputs.build_output }}
          runner_label: ${{ needs.case.outputs.runner_label }}
          cli_platform: ${{ needs.case.outputs.cli_platform }}
          cli_version: ${{ inputs.cli_version }}
          setup_qemu: ${{ needs.case.outputs.setup_qemu }}
          benchmark_workspace: boringcache/docker-cache-proof
          buildkit_image: ${{ inputs.buildkit_image || vars.DOCKER_CACHE_PROOFS_BUILDKIT_IMAGE || vars.DOCKER_CACHE_PROOFS_PREWARM_BUILDKIT_IMAGE || 'ghcr.io/boringcache/buildkit:v0.30.0-bc' }}
