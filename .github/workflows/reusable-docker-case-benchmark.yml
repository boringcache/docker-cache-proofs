name: "Reusable Docker Case Benchmark"

on:
  workflow_call:
    inputs:
      strategy:
        required: true
        type: string
      cache_lane:
        required: false
        type: string
        default: fresh
      buildkit_backend:
        required: false
        type: string
        default: registry
      benchmark_id:
        required: true
        type: string
      cache_id:
        description: 'Cache namespace used for cache keys/tags. Defaults to benchmark_id; investigation workflows can set a stable cache_id while using a distinct benchmark_id for artifacts.'
        required: false
        type: string
        default: ''
      runner_label:
        description: 'GitHub Actions runner label for Docker build jobs.'
        required: false
        type: string
        default: ubuntu-latest
      cache_scope_suffix:
        description: 'Optional suffix appended to rolling cache scopes for investigation lanes.'
        required: false
        type: string
        default: ''
      project_repo:
        required: true
        type: string
      project_ref:
        required: true
        type: string
      case_id:
        required: true
        type: string
      case_ref_key:
        required: true
        type: string
      dockerfile_path:
        required: false
        type: string
        default: .work/source/Dockerfile
      docker_context:
        required: false
        type: string
        default: .work/source
      image_tag:
        required: true
        type: string
      docker_build_extra_args:
        required: false
        type: string
        default: ''
      build_output:
        description: 'Image output mode for UX parity. none measures cache-only build; local-registry will be wired once native push emulation is ready.'
        required: false
        type: string
        default: none
      cli_platform:
        required: false
        type: string
        default: linux-amd64
      benchmark_workspace:
        required: false
        type: string
        default: ""
      cli_ref:
        required: false
        type: string
        default: ''
      blob_download_concurrency:
        required: false
        type: string
        default: ''
      blob_prefetch_concurrency:
        required: false
        type: string
        default: ''
      oci_stream_through_min_bytes:
        required: false
        type: string
        default: ''
      free_disk_space:
        description: 'Reclaim runner disk before the Docker build. Useful for large real-world Docker images that can exhaust hosted-runner space mid-build.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

env:
  PROJECT_REPO: ${{ inputs.project_repo }}
  PROJECT_REF: ${{ inputs.project_ref }}
  CASE_ID: ${{ inputs.case_id }}
  CASE_REF_KEY: ${{ inputs.case_ref_key }}
  BENCHMARK_ID: ${{ inputs.benchmark_id }}
  CACHE_ID: ${{ inputs.cache_id || inputs.benchmark_id }}
  BENCHMARK_WORKSPACE: ${{ inputs.benchmark_workspace || github.repository }}
  CACHE_LANE: ${{ inputs.cache_lane }}
  BUILDKIT_BACKEND: ${{ inputs.buildkit_backend }}
  CACHE_SCOPE_SUFFIX: ${{ inputs.cache_scope_suffix }}
  DOCKER_BUILD_EXTRA_ARGS: ${{ inputs.docker_build_extra_args }}
  BENCHMARK_BUILD_OUTPUT: ${{ inputs.build_output }}
  BORINGCACHE_BLOB_DOWNLOAD_CONCURRENCY: ${{ inputs.blob_download_concurrency }}
  BORINGCACHE_BLOB_PREFETCH_CONCURRENCY: ${{ inputs.blob_prefetch_concurrency }}
  BORINGCACHE_OCI_STREAM_THROUGH_MIN_BYTES: ${{ inputs.oci_stream_through_min_bytes }}

jobs:
  seed-cache:
    name: ${{ format('Docker {0} ({1}, {2}, {3})', inputs.cache_lane == 'rolling' && 'Commit Build' || 'Cold Build', inputs.strategy == 'actions-cache' && 'GitHub Actions Cache' || 'BoringCache', inputs.strategy == 'boringcache' && inputs.buildkit_backend || 'gha', inputs.cache_lane == 'rolling' && 'rolling' || 'fresh') }}
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      cache_scope: ${{ inputs.strategy == 'boringcache' && steps.scope.outputs.cache_scope || steps.cold_baseline_build.outputs.cache_scope }}
      cold_seconds: ${{ steps.cold_baseline_build.outputs.seconds }}
      cold_build_seconds: ${{ steps.cold_baseline_build.outputs.build_seconds }}
      scope_started_at: ${{ steps.scope.outputs.scope_started_at }}
      docker_cache_export_seconds: ${{ steps.cold_baseline_build.outputs.docker_cache_export_seconds }}
      docker_cache_import_seconds: ${{ steps.cold_baseline_build.outputs.docker_cache_import_seconds }}
      buildkit_cached_steps: ${{ steps.cold_baseline_build.outputs.buildkit_cached_steps }}
      tags_csv: ${{ steps.scope.outputs.tags_csv }}
      cache_import_status: ${{ steps.cold_baseline_build.outputs.cache_import_status }}
      oci_hydration_policy: ${{ steps.cold_baseline_build.outputs.oci_hydration_policy }}
      oci_body_local_hits: ${{ steps.cold_baseline_build.outputs.oci_body_local_hits }}
      oci_body_remote_fetches: ${{ steps.cold_baseline_build.outputs.oci_body_remote_fetches }}
      oci_body_local_bytes: ${{ steps.cold_baseline_build.outputs.oci_body_local_bytes }}
      oci_body_remote_bytes: ${{ steps.cold_baseline_build.outputs.oci_body_remote_bytes }}
      oci_body_local_duration_ms: ${{ steps.cold_baseline_build.outputs.oci_body_local_duration_ms }}
      oci_body_remote_duration_ms: ${{ steps.cold_baseline_build.outputs.oci_body_remote_duration_ms }}
      startup_oci_body_inserted: ${{ steps.cold_baseline_build.outputs.startup_oci_body_inserted }}
      startup_oci_body_failures: ${{ steps.cold_baseline_build.outputs.startup_oci_body_failures }}
      startup_oci_body_cold_blobs: ${{ steps.cold_baseline_build.outputs.startup_oci_body_cold_blobs }}
      startup_oci_body_duration_ms: ${{ steps.cold_baseline_build.outputs.startup_oci_body_duration_ms }}
      oci_new_blob_count: ${{ steps.cold_baseline_build.outputs.oci_new_blob_count }}
      oci_new_blob_bytes: ${{ steps.cold_baseline_build.outputs.oci_new_blob_bytes }}
      oci_upload_requested_blobs: ${{ steps.cold_baseline_build.outputs.oci_upload_requested_blobs }}
      oci_upload_already_present: ${{ steps.cold_baseline_build.outputs.oci_upload_already_present }}
      oci_upload_batch_seconds: ${{ steps.cold_baseline_build.outputs.oci_upload_batch_seconds }}
    steps:
      - name: Free disk space
        if: inputs.free_disk_space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: Validate BoringCache secrets
        if: inputs.strategy == 'boringcache'
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${BORINGCACHE_RESTORE_TOKEN}" ]]; then
            echo "Missing BORINGCACHE_RESTORE_TOKEN secret" >&2
            exit 1
          fi
          if [[ -z "${BORINGCACHE_SAVE_TOKEN}" ]]; then
            echo "Missing BORINGCACHE_SAVE_TOKEN secret" >&2
            exit 1
          fi

      - name: Install BoringCache CLI with boringcache/one
        if: inputs.strategy == 'boringcache'
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cli-platform: ${{ inputs.cli_platform }}
          cache-runtime: false

      - name: Validate internal CLI ref diagnostic
        if: inputs.strategy == 'boringcache' && inputs.cli_ref != ''
        env:
          CLI_REF: ${{ inputs.cli_ref }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          if [[ "${REPOSITORY_OWNER}" != "boringcache" ]]; then
            echo "cli_ref is an internal BoringCache benchmark diagnostic and is disabled outside boringcache-owned benchmark repos." >&2
            exit 1
          fi
          {
            echo "### Internal CLI ref diagnostic"
            echo
            echo "Using boringcache/cli ref \`${CLI_REF}\` for the outer registry proxy only."
            echo "Launch proof runs should leave \`cli_ref\` empty and use the CLI bundled by \`boringcache/one@v1\`."
            echo "The Dockerfile and build context remain the pinned upstream source; no BoringCache helper is mounted into Docker RUN steps."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout BoringCache CLI ref
        if: inputs.strategy == 'boringcache' && inputs.cli_ref != ''
        uses: actions/checkout@v6
        with:
          repository: boringcache/cli
          ref: ${{ inputs.cli_ref }}
          path: .boringcache-cli
          fetch-depth: 1

      - name: Build BoringCache CLI ref
        if: inputs.strategy == 'boringcache' && inputs.cli_ref != ''
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
          cargo build --release --locked --target x86_64-unknown-linux-musl --manifest-path .boringcache-cli/Cargo.toml --bin boringcache
          mkdir -p "$HOME/.local/bin"
          cp .boringcache-cli/target/x86_64-unknown-linux-musl/release/boringcache "$HOME/.local/bin/boringcache"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/boringcache" --version

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Prepare pinned case source tree
        run: ./scripts/prepare-case-source.sh "$CASE_ID" "$CASE_REF_KEY"

      - name: Start local registry for push emulation
        if: inputs.build_output == 'local-registry'
        run: docker run -d -p 5001:5000 --name cache-proof-registry registry:2

      - name: Start seed timing
        id: seed_timing_start
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Prepare benchmark scope
        id: scope
        run: |
          set -euo pipefail
          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          ref_slug="${ref_slug#-}"
          ref_slug="${ref_slug%-}"
          ref_slug="${ref_slug:-main}"
          scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"

          if [[ "$CACHE_LANE" == "rolling" ]]; then
            run_suffix="rolling-${ref_slug}${CACHE_SCOPE_SUFFIX}"
          else
            run_suffix="r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          fi

          if [[ "${{ inputs.strategy }}" == "boringcache" ]]; then
            cache_scope="${CACHE_ID}-run-${run_suffix}"
            registry_proxy_tags="${cache_scope}"
            tags_csv="${cache_scope}"
            echo "cache_scope=${cache_scope}" >> "$GITHUB_OUTPUT"
            echo "registry_proxy_tags=${registry_proxy_tags}" >> "$GITHUB_OUTPUT"
            echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"
          else
            if [[ "$CACHE_LANE" == "rolling" ]]; then
              cache_scope_primary="${CACHE_ID}-rolling-${ref_slug}${CACHE_SCOPE_SUFFIX}"
              cache_scope_fallback="${CACHE_ID}-rolling-${ref_slug}${CACHE_SCOPE_SUFFIX}-fallback"
            else
              cache_scope_primary="${CACHE_ID}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}-s1"
              cache_scope_fallback="${CACHE_ID}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}-s2"
            fi
            echo "cache_scope_primary=${cache_scope_primary}" >> "$GITHUB_OUTPUT"
            echo "cache_scope_fallback=${cache_scope_fallback}" >> "$GITHUB_OUTPUT"
          fi


      - name: Configure boringcache/one for Docker
        if: inputs.strategy == 'boringcache' && inputs.buildkit_backend == 'registry'
        id: docker_cache
        uses: boringcache/one@v1
        with:
          cli-version: ${{ inputs.cli_ref != '' && 'skip' || '' }}
          setup: none
          cache-runtime: false
          mode: docker
          docker-command: setup
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cache-tag: ${{ steps.scope.outputs.cache_scope }}
          registry-tag: ${{ steps.scope.outputs.registry_proxy_tags }}
          proxy-no-git: 'true'
          driver-opts: |
            network=host
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
          BORINGCACHE_OBSERVABILITY_JSONL_PATH: ${{ runner.temp }}/${{ inputs.benchmark_id }}-boringcache-seed-observability.jsonl

      - name: Set up Docker Buildx
        if: inputs.strategy == 'actions-cache'
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host

      - name: Expose GitHub runtime for Buildx cache
        if: inputs.strategy == 'actions-cache'
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Prepare GitHub Actions Cache write probe
        if: inputs.strategy == 'actions-cache'
        run: |
          set -euo pipefail
          mkdir -p .bench-cache-probe
          printf '%s\n' "probe-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(date +%s)" > .bench-cache-probe/probe.txt

      - name: Verify GitHub Actions Cache write access
        if: inputs.strategy == 'actions-cache'
        id: cache_write_probe
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            .bench-cache-probe
          key: ac-${{ inputs.benchmark_id }}-write-probe-r${{ github.run_id }}-a${{ github.run_attempt }}

      - name: Fail early if GitHub Actions Cache is read-only
        if: inputs.strategy == 'actions-cache' && steps.cache_write_probe.outcome != 'success'
        run: |
          echo "GitHub Actions Cache write probe failed (likely read-only budget/spending cap)." >&2
          echo "Cannot produce reliable GitHub Actions Cache benchmark results until cache writes are enabled." >&2
          exit 1

      - name: ${{ inputs.cache_lane == 'rolling' && 'Run rolling commit build' || 'Run fresh cold build' }}
        id: cold_baseline_build
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
          BORINGCACHE_PROXY_LOG_PATH: ${{ steps.docker_cache.outputs.proxy-log-path }}
          BORINGCACHE_PROXY_PORT: ${{ steps.docker_cache.outputs.proxy-port }}
          BORINGCACHE_CACHE_IMPORT_READY: ${{ steps.docker_cache.outputs.docker-cache-import-ready }}
          BORINGCACHE_CACHE_REQUESTED_FROM_REFS: ${{ steps.docker_cache.outputs.docker-cache-requested-from-refs }}
          BORINGCACHE_CACHE_USED_FROM_REFS: ${{ steps.docker_cache.outputs.docker-cache-from-refs }}
          BORINGCACHE_CACHE_UNREADABLE_FROM_REFS: ${{ steps.docker_cache.outputs.docker-cache-unreadable-from-refs }}
          BORINGCACHE_DOCKER_PROMOTION_REFS: ${{ steps.docker_cache.outputs.docker-cache-promotion-refs }}
          BUILDER: ${{ inputs.strategy == 'boringcache' && steps.docker_cache.outputs.buildx-name || steps.buildx.outputs.name }}
          CACHE_FROM: ${{ steps.docker_cache.outputs.cache-from }}
          CACHE_TO: ${{ steps.docker_cache.outputs.cache-to }}
          CACHE_SCOPE: ${{ steps.scope.outputs.cache_scope }}
          CACHE_SCOPE_PRIMARY: ${{ steps.scope.outputs.cache_scope_primary }}
          CACHE_SCOPE_FALLBACK: ${{ steps.scope.outputs.cache_scope_fallback }}
          BORINGCACHE_REGISTRY_PROXY_TAGS: ${{ steps.scope.outputs.registry_proxy_tags }}
          BORINGCACHE_OBSERVABILITY_JSONL_PATH: ${{ runner.temp }}/${{ inputs.benchmark_id }}-boringcache-seed-observability.jsonl
          ALLOW_BORINGCACHE_ROLLING_BOOTSTRAP: ${{ inputs.cache_lane == 'rolling' && 'true' || '' }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
          BENCHMARK_DOCKER_CONTEXT: ${{ inputs.docker_context }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${{ inputs.strategy }}" == "boringcache" ]]; then
            metrics_file="${RUNNER_TEMP}/cold-build-metrics.env"
            diagnostics_file="benchmark-diagnostics/${BENCHMARK_ID}-boringcache-${CACHE_LANE}-seed.txt"
            observability_artifact="benchmark-diagnostics/${BENCHMARK_ID}-boringcache-${CACHE_LANE}-seed-observability.jsonl"
            rm -f "$metrics_file"
            rm -f "$diagnostics_file"
            rm -f "$observability_artifact"
            mkdir -p "$(dirname "$diagnostics_file")"
            if [[ "$BUILDKIT_BACKEND" == "registry" && "$CACHE_LANE" == "rolling" ]]; then
              if [[ "$BUILDKIT_BACKEND" == "registry" ]] && { [[ "${BORINGCACHE_CACHE_IMPORT_READY:-}" != "true" ]] || [[ -z "${CACHE_FROM:-}" && -z "${BORINGCACHE_CACHE_USED_FROM_REFS:-}" ]]; }; then
                echo "Rolling BoringCache Docker import was not ready; continuing as a bootstrap/update sample." >&2
                echo "import ready: ${BORINGCACHE_CACHE_IMPORT_READY:-}" >&2
                echo "requested refs: ${BORINGCACHE_CACHE_REQUESTED_FROM_REFS:-}" >&2
                echo "used refs: ${BORINGCACHE_CACHE_USED_FROM_REFS:-}" >&2
                echo "unreadable refs: ${BORINGCACHE_CACHE_UNREADABLE_FROM_REFS:-}" >&2
                echo "This run will publish the rolling-scope OCI alias for the next continuous-commit sample." >&2
              fi
            fi
            phase_start="${{ steps.seed_timing_start.outputs.started_at }}"
            start="$(date +%s)"
            set +e
            benchmark_script="./scripts/run-boringcache-buildkit-benchmark.sh"
            if [[ "$BUILDKIT_BACKEND" == "native" ]]; then
              benchmark_script="./scripts/run-boringcache-native-buildkit-benchmark.sh"
            fi
            BENCHMARK_METRICS_OUTPUT="$metrics_file" BENCHMARK_DIAGNOSTICS_OUTPUT="$diagnostics_file" "$benchmark_script" ${{ inputs.cache_lane == 'rolling' && 'full' || 'seed-cache' }}
            status="$?"
            set -e
            end="$(date +%s)"
            if [[ -s "$diagnostics_file" ]]; then
              {
                echo "seed_phase_started_at=${phase_start}"
                echo "seed_build_started_at=${start}"
                echo "seed_build_finished_at=${end}"
                echo "seed_phase_wall_seconds=$((end - phase_start))"
                echo "seed_build_wall_seconds=$((end - start))"
              } >> "$diagnostics_file"
            fi
            if [[ -s "$BORINGCACHE_OBSERVABILITY_JSONL_PATH" ]]; then
              cp "$BORINGCACHE_OBSERVABILITY_JSONL_PATH" "$observability_artifact"
              mkdir -p benchmark-session-summary
              jq -c 'select(.operation == "cache_session_summary") | .summary // .details // .' "$BORINGCACHE_OBSERVABILITY_JSONL_PATH" 2>/dev/null | tail -n 1 > benchmark-session-summary/benchmark-session-summary.json || true
              if [[ ! -s benchmark-session-summary/benchmark-session-summary.json ]]; then
                rm -f benchmark-session-summary/benchmark-session-summary.json
              fi
            fi
            if [[ "$status" -ne 0 ]]; then
              exit "$status"
            fi
            echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
            echo "build_seconds=$((end - start))" >> "$GITHUB_OUTPUT"
            if [[ -s "$metrics_file" ]]; then
              cat "$metrics_file" >> "$GITHUB_OUTPUT"
              native_tool_evidence="$(grep "^native_tool_evidence=" "$metrics_file" | head -n1 | cut -d= -f2- || true)"
              if [[ "$BUILDKIT_BACKEND" == "native" && -n "$native_tool_evidence" && -s "$native_tool_evidence" ]]; then
                mkdir -p benchmark-native-tool
                cp "$native_tool_evidence" benchmark-native-tool/native-tool.json
              fi
            fi
          else
            build_log="$(mktemp /tmp/${BENCHMARK_ID}-ac-seed.XXXXXX.log)"
            find_step_id() {
              local pattern="$1"
              sed -nE "s/^#([0-9]+) ${pattern}.*/\\1/p" "$build_log" | tail -n1
            }
            find_step_seconds() {
              local step_id="$1"
              [[ -n "$step_id" ]] || return 0
              sed -nE "s/^#${step_id} DONE ([0-9]+(\\.[0-9]+)?)s$/\\1/p" "$build_log" | tail -n1
            }

            selected_scope="$CACHE_SCOPE_PRIMARY"
            phase_start="${{ steps.seed_timing_start.outputs.started_at }}"
            start="$(date +%s)"
            attempt=1
            while true; do
              extra_args=()
              output_args=()
              while IFS= read -r arg; do
                [[ -n "$arg" ]] || continue
                extra_args+=("$arg")
              done <<< "${DOCKER_BUILD_EXTRA_ARGS:-}"
              case "${BENCHMARK_BUILD_OUTPUT:-none}" in
                none)
                  ;;
                load)
                  output_args+=(--load)
                  ;;
                local-registry)
                  output_args+=(--push)
                  ;;
                *)
                  echo "Unknown BENCHMARK_BUILD_OUTPUT: ${BENCHMARK_BUILD_OUTPUT}" >&2
                  exit 1
                  ;;
              esac
              if [[ "$CACHE_LANE" == "rolling" ]]; then
                build_cache_args=(
                  --cache-from "type=gha,scope=${selected_scope}"
                  --cache-to "type=gha,mode=max,scope=${selected_scope}"
                )
              else
                build_cache_args=(
                  --no-cache
                  --cache-to "type=gha,mode=max,scope=${selected_scope}"
                )
              fi
              : > "$build_log"
              set +e
              DOCKER_BUILDKIT=1 docker buildx build \
                --builder "$BUILDER" \
                --file ${{ inputs.dockerfile_path }} \
                --tag ${{ inputs.image_tag }} \
                --progress=plain \
                "${extra_args[@]}" \
                "${build_cache_args[@]}" \
                "${output_args[@]}" \
                ${{ inputs.docker_context }} 2>&1 | tee "$build_log"
              status=${PIPESTATUS[0]}
              set -e

              if [[ "$status" -eq 0 ]]; then
                break
              fi

              if [[ "$attempt" -ge 2 ]]; then
                echo "Cold + seed cache build failed after retry" >&2
                exit "$status"
              fi

              attempt=$((attempt + 1))
              if [[ "$attempt" -eq 2 ]]; then
                selected_scope="$CACHE_SCOPE_FALLBACK"
                echo "Retrying cold build with fallback cache scope: ${selected_scope}"
              fi
              sleep 5
            done

            export_verified=0
            for _ in $(seq 1 20); do
              response="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100&key=index-${selected_scope}" 2>/dev/null || true)"
              if [[ -n "$response" ]] && jq -e '.actions_caches | type == "array"' <<<"$response" >/dev/null 2>&1; then
                matches="$(jq '.actions_caches | length' <<<"$response")"
                if [[ "$matches" -gt 0 ]]; then
                  export_verified=1
                  break
                fi
              fi
              sleep 3
            done

            if [[ "$export_verified" -ne 1 ]]; then
              echo "Cold + seed cache export probe failed: no index cache entry was touched for index-${selected_scope}" >&2
              exit 1
            fi

            end="$(date +%s)"
            echo "cache_scope=${selected_scope}" >> "$GITHUB_OUTPUT"
            echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
            echo "build_seconds=$((end - start))" >> "$GITHUB_OUTPUT"
            import_step="$(find_step_id "importing cache manifest from")"
            import_seconds="$(find_step_seconds "$import_step")"
            if [[ -n "$import_seconds" ]]; then
              echo "docker_cache_import_seconds=${import_seconds}" >> "$GITHUB_OUTPUT"
            fi
            export_step="$(find_step_id "preparing build cache for export")"
            export_seconds="$(find_step_seconds "$export_step")"
            if [[ -n "$export_seconds" ]]; then
              echo "docker_cache_export_seconds=${export_seconds}" >> "$GITHUB_OUTPUT"
            fi
            cached_steps="$(grep -Ec '^#[0-9]+ CACHED$' "$build_log" || true)"
            echo "buildkit_cached_steps=${cached_steps}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload seed diagnostics
        if: inputs.strategy == 'boringcache' && always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-diagnostics-${{ inputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
          path: benchmark-diagnostics/*
          if-no-files-found: ignore

      - name: Upload BoringCache session summary
        if: inputs.strategy == 'boringcache' && always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-session-summary-${{ inputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
          path: benchmark-session-summary/benchmark-session-summary.json
          if-no-files-found: ignore

      - name: Upload native BuildKit evidence
        if: inputs.strategy == 'boringcache' && inputs.buildkit_backend == 'native' && always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-native-tool-${{ inputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}-seed
          path: benchmark-native-tool/native-tool.json
          if-no-files-found: ignore

  scenario-builds:
    name: ${{ format('Warm rerun ({0})', inputs.strategy == 'actions-cache' && 'GitHub Actions Cache' || 'BoringCache') }}
    needs: seed-cache
    if: ${{ inputs.cache_lane != 'rolling' }}
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 180
    env:
      BORINGCACHE_SAVE_TOKEN: ''
    steps:
      - name: Free disk space
        if: inputs.free_disk_space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Prepare pinned case source tree
        run: ./scripts/prepare-case-source.sh "$CASE_ID" "$CASE_REF_KEY"

      - name: Start local registry for push emulation
        if: inputs.build_output == 'local-registry'
        run: docker run -d -p 5001:5000 --name cache-proof-registry registry:2

      - name: Start scenario timing
        id: scenario_timing_start
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Install BoringCache CLI with boringcache/one
        if: inputs.strategy == 'boringcache'
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cli-platform: ${{ inputs.cli_platform }}
          cache-runtime: false

      - name: Prepare benchmark scope
        if: inputs.strategy == 'boringcache'
        id: scope
        run: |
          set -euo pipefail
          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          ref_slug="${ref_slug#-}"
          ref_slug="${ref_slug%-}"
          ref_slug="${ref_slug:-main}"
          if [[ "$CACHE_LANE" == "rolling" ]]; then
            run_suffix="rolling-${ref_slug}${CACHE_SCOPE_SUFFIX}"
          else
            run_suffix="r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          fi
          cache_scope="${CACHE_ID}-run-${run_suffix}"
          tags_csv="${cache_scope}"
          registry_proxy_tags="${cache_scope}"
          echo "cache_scope=${cache_scope}" >> "$GITHUB_OUTPUT"
          echo "registry_proxy_tags=${registry_proxy_tags}" >> "$GITHUB_OUTPUT"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"


      - name: Configure boringcache/one for Docker
        if: inputs.strategy == 'boringcache' && inputs.buildkit_backend == 'registry'
        id: docker_cache
        uses: boringcache/one@v1
        with:
          cli-version: ${{ inputs.cli_ref != '' && 'skip' || '' }}
          setup: none
          cache-runtime: false
          mode: docker
          docker-command: setup
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cache-tag: ${{ needs.seed-cache.outputs.cache_scope }}
          registry-tag: ${{ steps.scope.outputs.registry_proxy_tags }}
          proxy-no-git: 'true'
          read-only: true
          driver-opts: |
            network=host
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}

      - name: Set up Docker Buildx
        if: inputs.strategy == 'actions-cache'
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host

      - name: Expose GitHub runtime for Buildx cache
        if: inputs.strategy == 'actions-cache'
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Prune builder cache for isolated scenario
        if: inputs.strategy != 'boringcache' || inputs.buildkit_backend == 'registry'
        run: docker buildx prune -f --builder "${{ inputs.strategy == 'boringcache' && steps.docker_cache.outputs.buildx-name || steps.buildx.outputs.name }}"

      - name: Run warm build 1
        id: warm1_build
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_PROXY_LOG_PATH: ${{ steps.docker_cache.outputs.proxy-log-path }}
          BORINGCACHE_PROXY_PORT: ${{ steps.docker_cache.outputs.proxy-port }}
          BORINGCACHE_CACHE_IMPORT_READY: ${{ steps.docker_cache.outputs.docker-cache-import-ready }}
          BORINGCACHE_CACHE_REQUESTED_FROM_REFS: ${{ steps.docker_cache.outputs.docker-cache-requested-from-refs }}
          BORINGCACHE_CACHE_USED_FROM_REFS: ${{ steps.docker_cache.outputs.docker-cache-from-refs }}
          BORINGCACHE_CACHE_UNREADABLE_FROM_REFS: ${{ steps.docker_cache.outputs.docker-cache-unreadable-from-refs }}
          BORINGCACHE_DOCKER_PROMOTION_REFS: ${{ steps.docker_cache.outputs.docker-cache-promotion-refs }}
          BUILDER: ${{ inputs.strategy == 'boringcache' && steps.docker_cache.outputs.buildx-name || steps.buildx.outputs.name }}
          CACHE_FROM: ${{ steps.docker_cache.outputs.cache-from }}
          CACHE_TO: ${{ steps.docker_cache.outputs.cache-to }}
          CACHE_SCOPE: ${{ needs.seed-cache.outputs.cache_scope }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
          BENCHMARK_DOCKER_CONTEXT: ${{ inputs.docker_context }}
        run: |
          set -euo pipefail

          if [[ "${{ inputs.strategy }}" == "boringcache" ]]; then
            metrics_file="${RUNNER_TEMP}/warm1-build-metrics.env"
            rm -f "$metrics_file"
            if [[ "$BUILDKIT_BACKEND" == "registry" ]] && { [[ "${BORINGCACHE_CACHE_IMPORT_READY:-}" != "true" ]] || [[ -z "${CACHE_FROM:-}" && -z "${BORINGCACHE_CACHE_USED_FROM_REFS:-}" ]]; }; then
              echo "BoringCache Docker warm import was not ready; refusing invalid warm sample." >&2
              echo "import ready: ${BORINGCACHE_CACHE_IMPORT_READY:-}" >&2
              echo "requested refs: ${BORINGCACHE_CACHE_REQUESTED_FROM_REFS:-}" >&2
              echo "used refs: ${BORINGCACHE_CACHE_USED_FROM_REFS:-}" >&2
              echo "unreadable refs: ${BORINGCACHE_CACHE_UNREADABLE_FROM_REFS:-}" >&2
              exit 1
            fi
            phase_start="${{ steps.scenario_timing_start.outputs.started_at }}"
            start="$(date +%s)"
            set +e
            benchmark_script="./scripts/run-boringcache-buildkit-benchmark.sh"
            if [[ "$BUILDKIT_BACKEND" == "native" ]]; then
              benchmark_script="./scripts/run-boringcache-native-buildkit-benchmark.sh"
            fi
            BENCHMARK_METRICS_OUTPUT="$metrics_file" "$benchmark_script" partial-warm
            status="$?"
            set -e
            end="$(date +%s)"
            if [[ "$status" -ne 0 ]]; then
              if [[ -s "$metrics_file" ]]; then
                cat "$metrics_file" >&2
              fi
              exit "$status"
            fi
            echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
            echo "build_seconds=$((end - start))" >> "$GITHUB_OUTPUT"
            if [[ -s "$metrics_file" ]]; then
              cat "$metrics_file" >> "$GITHUB_OUTPUT"
              native_tool_evidence="$(grep "^native_tool_evidence=" "$metrics_file" | head -n1 | cut -d= -f2- || true)"
              if [[ "$BUILDKIT_BACKEND" == "native" && -n "$native_tool_evidence" && -s "$native_tool_evidence" ]]; then
                mkdir -p benchmark-native-tool
                cp "$native_tool_evidence" benchmark-native-tool/native-tool.json
              fi
            fi
          else
            build_log="$(mktemp /tmp/${BENCHMARK_ID}-ac-warm1.XXXXXX.log)"
            find_step_id() {
              local pattern="$1"
              sed -nE "s/^#([0-9]+) ${pattern}.*/\\1/p" "$build_log" | tail -n1
            }
            find_step_seconds() {
              local step_id="$1"
              [[ -n "$step_id" ]] || return 0
              sed -nE "s/^#${step_id} DONE ([0-9]+(\\.[0-9]+)?)s$/\\1/p" "$build_log" | tail -n1
            }

            phase_start="${{ steps.scenario_timing_start.outputs.started_at }}"
            start="$(date +%s)"
            extra_args=()
            output_args=()
            while IFS= read -r arg; do
              [[ -n "$arg" ]] || continue
              extra_args+=("$arg")
            done <<< "${DOCKER_BUILD_EXTRA_ARGS:-}"
            case "${BENCHMARK_BUILD_OUTPUT:-none}" in
              none)
                ;;
              load)
                output_args+=(--load)
                ;;
              local-registry)
                output_args+=(--push)
                ;;
              *)
                echo "Unknown BENCHMARK_BUILD_OUTPUT: ${BENCHMARK_BUILD_OUTPUT}" >&2
                exit 1
                ;;
            esac
            attempt=1
            while true; do
              : > "$build_log"
              set +e
              DOCKER_BUILDKIT=1 docker buildx build \
                --builder "$BUILDER" \
                --file ${{ inputs.dockerfile_path }} \
                --tag ${{ inputs.image_tag }} \
                --progress=plain \
                "${extra_args[@]}" \
                --cache-from "type=gha,scope=${CACHE_SCOPE}" \
                "${output_args[@]}" \
                ${{ inputs.docker_context }} 2>&1 | tee "$build_log"
              status=${PIPESTATUS[0]}
              set -e

              if [[ "$status" -eq 0 ]]; then
                break
              fi

              if [[ "$attempt" -ge 2 ]]; then
                echo "Warm build 1 failed after retry" >&2
                exit "$status"
              fi

              attempt=$((attempt + 1))
              sleep 5
            done

            end="$(date +%s)"
            echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
            echo "build_seconds=$((end - start))" >> "$GITHUB_OUTPUT"
            import_step="$(find_step_id "importing cache manifest from")"
            import_seconds="$(find_step_seconds "$import_step")"
            if [[ -n "$import_seconds" ]]; then
              echo "docker_cache_import_seconds=${import_seconds}" >> "$GITHUB_OUTPUT"
            fi
            cached_steps="$(grep -Ec '^#[0-9]+ CACHED$' "$build_log" || true)"
            echo "buildkit_cached_steps=${cached_steps}" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture scenario timing
        id: phase_timing
        run: |
          set -euo pipefail
          seconds=""
          build_seconds=""
          cache_import_status=""
          docker_cache_import_seconds=""
          buildkit_cached_steps=""
          metric_names=(oci_hydration_policy oci_body_local_hits oci_body_remote_fetches oci_body_local_bytes oci_body_remote_bytes oci_body_local_duration_ms oci_body_remote_duration_ms startup_oci_body_inserted startup_oci_body_failures startup_oci_body_cold_blobs startup_oci_body_duration_ms)
          for metric_name in "${metric_names[@]}"; do
            printf -v "$metric_name" '%s' ''
          done
          seconds="${{ steps.warm1_build.outputs.seconds }}"
          build_seconds="${{ steps.warm1_build.outputs.build_seconds }}"
          cache_import_status="${{ steps.warm1_build.outputs.cache_import_status }}"
          docker_cache_import_seconds="${{ steps.warm1_build.outputs.docker_cache_import_seconds }}"
          buildkit_cached_steps="${{ steps.warm1_build.outputs.buildkit_cached_steps }}"
          oci_hydration_policy="${{ steps.warm1_build.outputs.oci_hydration_policy }}"
          oci_body_local_hits="${{ steps.warm1_build.outputs.oci_body_local_hits }}"
          oci_body_remote_fetches="${{ steps.warm1_build.outputs.oci_body_remote_fetches }}"
          oci_body_local_bytes="${{ steps.warm1_build.outputs.oci_body_local_bytes }}"
          oci_body_remote_bytes="${{ steps.warm1_build.outputs.oci_body_remote_bytes }}"
          oci_body_local_duration_ms="${{ steps.warm1_build.outputs.oci_body_local_duration_ms }}"
          oci_body_remote_duration_ms="${{ steps.warm1_build.outputs.oci_body_remote_duration_ms }}"
          startup_oci_body_inserted="${{ steps.warm1_build.outputs.startup_oci_body_inserted }}"
          startup_oci_body_failures="${{ steps.warm1_build.outputs.startup_oci_body_failures }}"
          startup_oci_body_cold_blobs="${{ steps.warm1_build.outputs.startup_oci_body_cold_blobs }}"
          startup_oci_body_duration_ms="${{ steps.warm1_build.outputs.startup_oci_body_duration_ms }}"
          if [[ -z "${seconds}" ]]; then
            echo "No timing captured for warm1" >&2
            exit 1
          fi
          echo "seconds=${seconds}" >> "$GITHUB_OUTPUT"
          echo "build_seconds=${build_seconds}" >> "$GITHUB_OUTPUT"
          if [[ -n "${cache_import_status}" ]]; then
            echo "cache_import_status=${cache_import_status}" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "${docker_cache_import_seconds}" ]]; then
            echo "docker_cache_import_seconds=${docker_cache_import_seconds}" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "${buildkit_cached_steps}" ]]; then
            echo "buildkit_cached_steps=${buildkit_cached_steps}" >> "$GITHUB_OUTPUT"
          fi
          for metric_name in "${metric_names[@]}"; do
            metric_value="${!metric_name}"
            if [[ -n "$metric_value" ]]; then
              echo "${metric_name}=${metric_value}" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Persist scenario timing artifact
        run: |
          set -euo pipefail
          mkdir -p benchmark-phase
          cat > "benchmark-phase/warm1.env" <<EOF
          phase=warm1
          seconds=${{ steps.phase_timing.outputs.seconds }}
          build_seconds=${{ steps.phase_timing.outputs.build_seconds }}
          cache_import_status=${{ steps.phase_timing.outputs.cache_import_status }}
          docker_cache_import_seconds=${{ steps.phase_timing.outputs.docker_cache_import_seconds }}
          buildkit_cached_steps=${{ steps.phase_timing.outputs.buildkit_cached_steps }}
          oci_hydration_policy=${{ steps.phase_timing.outputs.oci_hydration_policy }}
          oci_body_local_hits=${{ steps.phase_timing.outputs.oci_body_local_hits }}
          oci_body_remote_fetches=${{ steps.phase_timing.outputs.oci_body_remote_fetches }}
          oci_body_local_bytes=${{ steps.phase_timing.outputs.oci_body_local_bytes }}
          oci_body_remote_bytes=${{ steps.phase_timing.outputs.oci_body_remote_bytes }}
          oci_body_local_duration_ms=${{ steps.phase_timing.outputs.oci_body_local_duration_ms }}
          oci_body_remote_duration_ms=${{ steps.phase_timing.outputs.oci_body_remote_duration_ms }}
          startup_oci_body_inserted=${{ steps.phase_timing.outputs.startup_oci_body_inserted }}
          startup_oci_body_failures=${{ steps.phase_timing.outputs.startup_oci_body_failures }}
          startup_oci_body_cold_blobs=${{ steps.phase_timing.outputs.startup_oci_body_cold_blobs }}
          startup_oci_body_duration_ms=${{ steps.phase_timing.outputs.startup_oci_body_duration_ms }}
          EOF

      - name: Upload scenario timing artifact
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-phase-${{ inputs.benchmark_id }}-${{ inputs.strategy }}-warm1
          path: benchmark-phase/warm1.env
          if-no-files-found: error

      - name: Upload native BuildKit evidence
        if: inputs.strategy == 'boringcache' && inputs.buildkit_backend == 'native'
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-native-tool-${{ inputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}-warm1
          path: benchmark-native-tool/native-tool.json
          if-no-files-found: ignore

  finalize-benchmark:
    name: Finalize benchmark artifacts
    needs: [seed-cache, scenario-builds]
    if: ${{ always() && needs.seed-cache.result == 'success' && (needs.scenario-builds.result == 'success' || needs.scenario-builds.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout benchmark repo helpers
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: .benchmark-config

      - name: Install BoringCache CLI with boringcache/one
        if: inputs.strategy == 'boringcache'
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cli-platform: ${{ inputs.cli_platform }}
          cache-runtime: false

      - name: Download scenario timing artifacts
        if: ${{ inputs.cache_lane != 'rolling' }}
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-phase-${{ inputs.benchmark_id }}-${{ inputs.strategy }}-*
          path: benchmark-phase
          merge-multiple: true

      - name: Download BoringCache session summary
        if: inputs.strategy == 'boringcache' && inputs.buildkit_backend == 'registry'
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: benchmark-session-summary-${{ inputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
          path: benchmark-session-summary

      - name: Download native BuildKit seed evidence
        if: inputs.strategy == 'boringcache' && inputs.buildkit_backend == 'native' && inputs.cache_lane == 'rolling'
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: benchmark-native-tool-${{ inputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}-seed
          path: benchmark-native-tool

      - name: Download native BuildKit warm evidence
        if: inputs.strategy == 'boringcache' && inputs.buildkit_backend == 'native' && inputs.cache_lane != 'rolling'
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: benchmark-native-tool-${{ inputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}-warm1
          path: benchmark-native-tool

      - name: Collect scenario timings
        if: ${{ inputs.cache_lane != 'rolling' }}
        id: timings
        run: |
          set -euo pipefail
          parse_phase() {
            local phase="$1"
            local file="benchmark-phase/${phase}.env"
            if [[ ! -f "$file" ]]; then
              echo "Missing timing artifact for phase ${phase}" >&2
              ls -R benchmark-phase || true
              exit 1
            fi
            local seconds
            seconds="$(grep "^seconds=" "$file" | head -n1 | cut -d= -f2-)"
            if [[ -z "${seconds}" ]]; then
              echo "Timing artifact for phase ${phase} has empty seconds" >&2
              cat "$file" >&2
              exit 1
            fi
            local key="${phase//-/_}"
            echo "${key}_seconds=${seconds}" >> "$GITHUB_OUTPUT"
            local build_seconds
            build_seconds="$(grep "^build_seconds=" "$file" | head -n1 | cut -d= -f2- || true)"
            if [[ -n "${build_seconds}" ]]; then
              echo "${key}_build_seconds=${build_seconds}" >> "$GITHUB_OUTPUT"
            fi
            local docker_cache_import_seconds
            docker_cache_import_seconds="$(grep "^docker_cache_import_seconds=" "$file" | head -n1 | cut -d= -f2- || true)"
            if [[ -n "${docker_cache_import_seconds}" ]]; then
              echo "${key}_docker_cache_import_seconds=${docker_cache_import_seconds}" >> "$GITHUB_OUTPUT"
            fi
            metric_names=(cache_import_status buildkit_cached_steps oci_hydration_policy oci_body_local_hits oci_body_remote_fetches oci_body_local_bytes oci_body_remote_bytes oci_body_local_duration_ms oci_body_remote_duration_ms startup_oci_body_inserted startup_oci_body_failures startup_oci_body_cold_blobs startup_oci_body_duration_ms)
            for metric_name in "${metric_names[@]}"; do
              metric_value="$(grep "^${metric_name}=" "$file" | head -n1 | cut -d= -f2- || true)"
              if [[ -n "${metric_value}" ]]; then
                echo "${key}_${metric_name}=${metric_value}" >> "$GITHUB_OUTPUT"
              fi
            done
          }
          parse_phase warm1

      - name: Measure BoringCache storage usage
        if: inputs.strategy == 'boringcache'
        id: bc_cache_size
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}
        run: |
          tags_csv="${{ needs.seed-cache.outputs.tags_csv }}"
          mkdir -p benchmark-storage
          breakdown_path="benchmark-storage/boringcache-storage-breakdown.json"
          exact_tags=""
          if [[ "$BUILDKIT_BACKEND" == "native" ]]; then
            exact_tags="$tags_csv"
          fi
          bytes="$(BORINGCACHE_STORAGE_BREAKDOWN_PATH="$breakdown_path" BORINGCACHE_EXACT_TAGS="$exact_tags" .benchmark-config/scripts/sum-boringcache-check-sizes.sh "$BENCHMARK_WORKSPACE" "$tags_csv")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"
          echo "breakdown_path=${breakdown_path}" >> "$GITHUB_OUTPUT"

      - name: Measure GitHub Actions Cache storage usage
        if: inputs.strategy == 'actions-cache'
        id: ac_cache_size
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bytes="$(.benchmark-config/scripts/sum-gha-cache-by-key.sh "$BENCHMARK_ID" "${{ needs.seed-cache.outputs.scope_started_at }}")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"

      - name: Capture pinned upstream ref
        id: upstream_ref
        run: echo "sha=${PROJECT_REF}" >> "$GITHUB_OUTPUT"

      - name: Normalize benchmark fields
        id: normalize
        env:
          STRATEGY: ${{ inputs.strategy }}
          CACHE_LANE: ${{ inputs.cache_lane }}
          SEED_COLD_SECONDS: ${{ needs.seed-cache.outputs.cold_seconds }}
          SEED_COLD_BUILD_SECONDS: ${{ needs.seed-cache.outputs.cold_build_seconds }}
          SEED_DOCKER_EXPORT_SECONDS: ${{ needs.seed-cache.outputs.docker_cache_export_seconds }}
          SEED_DOCKER_IMPORT_SECONDS: ${{ needs.seed-cache.outputs.docker_cache_import_seconds }}
          SEED_BUILDKIT_CACHED_STEPS: ${{ needs.seed-cache.outputs.buildkit_cached_steps }}
          SEED_CACHE_IMPORT_STATUS: ${{ needs.seed-cache.outputs.cache_import_status }}
          SEED_OCI_HYDRATION_POLICY: ${{ needs.seed-cache.outputs.oci_hydration_policy }}
          SEED_OCI_BODY_LOCAL_HITS: ${{ needs.seed-cache.outputs.oci_body_local_hits }}
          SEED_OCI_BODY_REMOTE_FETCHES: ${{ needs.seed-cache.outputs.oci_body_remote_fetches }}
          SEED_OCI_BODY_LOCAL_BYTES: ${{ needs.seed-cache.outputs.oci_body_local_bytes }}
          SEED_OCI_BODY_REMOTE_BYTES: ${{ needs.seed-cache.outputs.oci_body_remote_bytes }}
          SEED_OCI_BODY_LOCAL_DURATION_MS: ${{ needs.seed-cache.outputs.oci_body_local_duration_ms }}
          SEED_OCI_BODY_REMOTE_DURATION_MS: ${{ needs.seed-cache.outputs.oci_body_remote_duration_ms }}
          SEED_STARTUP_OCI_BODY_INSERTED: ${{ needs.seed-cache.outputs.startup_oci_body_inserted }}
          SEED_STARTUP_OCI_BODY_FAILURES: ${{ needs.seed-cache.outputs.startup_oci_body_failures }}
          SEED_STARTUP_OCI_BODY_COLD_BLOBS: ${{ needs.seed-cache.outputs.startup_oci_body_cold_blobs }}
          SEED_STARTUP_OCI_BODY_DURATION_MS: ${{ needs.seed-cache.outputs.startup_oci_body_duration_ms }}
          SEED_OCI_NEW_BLOB_COUNT: ${{ needs.seed-cache.outputs.oci_new_blob_count }}
          SEED_OCI_NEW_BLOB_BYTES: ${{ needs.seed-cache.outputs.oci_new_blob_bytes }}
          SEED_OCI_UPLOAD_REQUESTED_BLOBS: ${{ needs.seed-cache.outputs.oci_upload_requested_blobs }}
          SEED_OCI_UPLOAD_ALREADY_PRESENT: ${{ needs.seed-cache.outputs.oci_upload_already_present }}
          SEED_OCI_UPLOAD_BATCH_SECONDS: ${{ needs.seed-cache.outputs.oci_upload_batch_seconds }}
          WARM1_SECONDS: ${{ steps.timings.outputs.warm1_seconds }}
          WARM1_BUILD_SECONDS: ${{ steps.timings.outputs.warm1_build_seconds }}
          WARM1_DOCKER_CACHE_IMPORT_SECONDS: ${{ steps.timings.outputs.warm1_docker_cache_import_seconds }}
          WARM1_BUILDKIT_CACHED_STEPS: ${{ steps.timings.outputs.warm1_buildkit_cached_steps }}
          WARM1_CACHE_IMPORT_STATUS: ${{ steps.timings.outputs.warm1_cache_import_status }}
          WARM1_OCI_HYDRATION_POLICY: ${{ steps.timings.outputs.warm1_oci_hydration_policy }}
          WARM1_OCI_BODY_LOCAL_HITS: ${{ steps.timings.outputs.warm1_oci_body_local_hits }}
          WARM1_OCI_BODY_REMOTE_FETCHES: ${{ steps.timings.outputs.warm1_oci_body_remote_fetches }}
          WARM1_OCI_BODY_LOCAL_BYTES: ${{ steps.timings.outputs.warm1_oci_body_local_bytes }}
          WARM1_OCI_BODY_REMOTE_BYTES: ${{ steps.timings.outputs.warm1_oci_body_remote_bytes }}
          WARM1_OCI_BODY_LOCAL_DURATION_MS: ${{ steps.timings.outputs.warm1_oci_body_local_duration_ms }}
          WARM1_OCI_BODY_REMOTE_DURATION_MS: ${{ steps.timings.outputs.warm1_oci_body_remote_duration_ms }}
          WARM1_STARTUP_OCI_BODY_INSERTED: ${{ steps.timings.outputs.warm1_startup_oci_body_inserted }}
          WARM1_STARTUP_OCI_BODY_FAILURES: ${{ steps.timings.outputs.warm1_startup_oci_body_failures }}
          WARM1_STARTUP_OCI_BODY_COLD_BLOBS: ${{ steps.timings.outputs.warm1_startup_oci_body_cold_blobs }}
          WARM1_STARTUP_OCI_BODY_DURATION_MS: ${{ steps.timings.outputs.warm1_startup_oci_body_duration_ms }}
          BC_BYTES: ${{ steps.bc_cache_size.outputs.bytes }}
          BC_STORAGE_BREAKDOWN_PATH: ${{ steps.bc_cache_size.outputs.breakdown_path }}
          AC_BYTES: ${{ steps.ac_cache_size.outputs.bytes }}
        run: |
          set -euo pipefail

          require() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              echo "Required field '${name}' is empty for strategy=${STRATEGY} lane=${CACHE_LANE}" >&2
              exit 1
            fi
          }

          emit() {
            local key="$1"
            local value="$2"
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          }

          require cold_seconds "$SEED_COLD_SECONDS"
          emit cold_seconds "$SEED_COLD_SECONDS"
          emit cold_build_seconds "$SEED_COLD_BUILD_SECONDS"
          emit docker_cache_export_seconds "$SEED_DOCKER_EXPORT_SECONDS"

          if [[ "$CACHE_LANE" == "rolling" ]]; then
            emit warm1_seconds ""
            emit warm1_build_seconds ""
            emit docker_cache_import_seconds "$SEED_DOCKER_IMPORT_SECONDS"
            emit buildkit_cached_steps "$SEED_BUILDKIT_CACHED_STEPS"
          else
            require warm1_seconds "$WARM1_SECONDS"
            emit warm1_seconds "$WARM1_SECONDS"
            emit warm1_build_seconds "$WARM1_BUILD_SECONDS"
            emit docker_cache_import_seconds "$WARM1_DOCKER_CACHE_IMPORT_SECONDS"
            emit buildkit_cached_steps "$WARM1_BUILDKIT_CACHED_STEPS"
          fi

          if [[ "$STRATEGY" == "boringcache" ]]; then
            if [[ "$CACHE_LANE" == "rolling" ]]; then
              cache_import_status="$SEED_CACHE_IMPORT_STATUS"
              oci_hydration_policy="$SEED_OCI_HYDRATION_POLICY"
              oci_body_local_hits="$SEED_OCI_BODY_LOCAL_HITS"
              oci_body_remote_fetches="$SEED_OCI_BODY_REMOTE_FETCHES"
              oci_body_local_bytes="$SEED_OCI_BODY_LOCAL_BYTES"
              oci_body_remote_bytes="$SEED_OCI_BODY_REMOTE_BYTES"
              oci_body_local_duration_ms="$SEED_OCI_BODY_LOCAL_DURATION_MS"
              oci_body_remote_duration_ms="$SEED_OCI_BODY_REMOTE_DURATION_MS"
              startup_oci_body_inserted="$SEED_STARTUP_OCI_BODY_INSERTED"
              startup_oci_body_failures="$SEED_STARTUP_OCI_BODY_FAILURES"
              startup_oci_body_cold_blobs="$SEED_STARTUP_OCI_BODY_COLD_BLOBS"
              startup_oci_body_duration_ms="$SEED_STARTUP_OCI_BODY_DURATION_MS"
            else
              require cache_import_status "$WARM1_CACHE_IMPORT_STATUS"
              cache_import_status="$WARM1_CACHE_IMPORT_STATUS"
              oci_hydration_policy="$WARM1_OCI_HYDRATION_POLICY"
              oci_body_local_hits="$WARM1_OCI_BODY_LOCAL_HITS"
              oci_body_remote_fetches="$WARM1_OCI_BODY_REMOTE_FETCHES"
              oci_body_local_bytes="$WARM1_OCI_BODY_LOCAL_BYTES"
              oci_body_remote_bytes="$WARM1_OCI_BODY_REMOTE_BYTES"
              oci_body_local_duration_ms="$WARM1_OCI_BODY_LOCAL_DURATION_MS"
              oci_body_remote_duration_ms="$WARM1_OCI_BODY_REMOTE_DURATION_MS"
              startup_oci_body_inserted="$WARM1_STARTUP_OCI_BODY_INSERTED"
              startup_oci_body_failures="$WARM1_STARTUP_OCI_BODY_FAILURES"
              startup_oci_body_cold_blobs="$WARM1_STARTUP_OCI_BODY_COLD_BLOBS"
              startup_oci_body_duration_ms="$WARM1_STARTUP_OCI_BODY_DURATION_MS"
            fi

            emit cache_import_status "$cache_import_status"
            emit oci_hydration_policy "$oci_hydration_policy"
            emit oci_body_local_hits "$oci_body_local_hits"
            emit oci_body_remote_fetches "$oci_body_remote_fetches"
            emit oci_body_local_bytes "$oci_body_local_bytes"
            emit oci_body_remote_bytes "$oci_body_remote_bytes"
            emit oci_body_local_duration_ms "$oci_body_local_duration_ms"
            emit oci_body_remote_duration_ms "$oci_body_remote_duration_ms"
            emit startup_oci_body_inserted "$startup_oci_body_inserted"
            emit startup_oci_body_failures "$startup_oci_body_failures"
            emit startup_oci_body_cold_blobs "$startup_oci_body_cold_blobs"
            emit startup_oci_body_duration_ms "$startup_oci_body_duration_ms"
            emit oci_new_blob_count "$SEED_OCI_NEW_BLOB_COUNT"
            emit oci_new_blob_bytes "$SEED_OCI_NEW_BLOB_BYTES"
            emit oci_upload_requested_blobs "$SEED_OCI_UPLOAD_REQUESTED_BLOBS"
            emit oci_upload_already_present "$SEED_OCI_UPLOAD_ALREADY_PRESENT"
            emit oci_upload_batch_seconds "$SEED_OCI_UPLOAD_BATCH_SECONDS"

            require cache_storage_bytes "$BC_BYTES"
            emit cache_storage_bytes "$BC_BYTES"
            emit cache_storage_source "boringcache-check"
            emit cache_storage_breakdown_json "$BC_STORAGE_BREAKDOWN_PATH"
            emit bytes_uploaded "$BC_BYTES"

            if [[ "$CACHE_LANE" == "rolling" ]]; then
              emit hit_behavior_note "Rolling lane: one continuous-commit build imports the prior branch/default OCI cache, exports/promotes the updated cache, and records that commit build only. Fresh lane owns the separate cold-build plus warm-rerun parity check."
            else
              emit hit_behavior_note "Fresh lane: the cold build starts from empty BoringCache tags and empty Docker layer cache, uses --no-cache + cache-to via the BoringCache registry proxy (mode=max), and records cold timing while populating the shared cache. Warm1 rebuilds the same pinned base tree on a fresh runner with cache-from only, no helper mounted inside Docker RUN steps, and no synthetic mutations."
            fi
          else
            emit cache_import_status ""
            emit oci_hydration_policy ""
            emit oci_body_local_hits ""
            emit oci_body_remote_fetches ""
            emit oci_body_local_bytes ""
            emit oci_body_remote_bytes ""
            emit oci_body_local_duration_ms ""
            emit oci_body_remote_duration_ms ""
            emit startup_oci_body_inserted ""
            emit startup_oci_body_failures ""
            emit startup_oci_body_cold_blobs ""
            emit startup_oci_body_duration_ms ""
            emit oci_new_blob_count ""
            emit oci_new_blob_bytes ""
            emit oci_upload_requested_blobs ""
            emit oci_upload_already_present ""
            emit oci_upload_batch_seconds ""

            require cache_storage_bytes "$AC_BYTES"
            emit cache_storage_bytes "$AC_BYTES"
            emit cache_storage_source "github-actions-cache-api"
            emit cache_storage_breakdown_json ""
            emit bytes_uploaded ""

            if [[ "$CACHE_LANE" == "rolling" ]]; then
              emit hit_behavior_note "Rolling lane: one continuous-commit build imports the prior GitHub Actions cache, exports the updated cache, and records that commit build only. Fresh lane owns the separate cold-build plus warm-rerun parity check."
            else
              emit hit_behavior_note "Fresh lane: the cold build runs the pinned base tree with --no-cache + cache-to type=gha (mode=max) and records cold timing while populating remote cache. Warm1 rebuilds the same pinned base tree on a fresh runner with cache-from only and no synthetic mutations."
            fi
          fi

      - name: Write benchmark artifacts
        id: artifact_files
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
        run: |
          cache_summary_args=()
          if [[ -s benchmark-session-summary/benchmark-session-summary.json ]]; then
            cache_summary_args=(--cache-session-summary-json benchmark-session-summary/benchmark-session-summary.json)
          fi
          native_tool_args=()
          if [[ -s benchmark-native-tool/native-tool.json ]]; then
            native_tool_args=(--native-tool-evidence-json benchmark-native-tool/native-tool.json)
          fi

          .benchmark-config/scripts/write-benchmark-artifacts.sh \
            --benchmark "$BENCHMARK_ID" \
            --strategy "${{ inputs.strategy }}" \
            --lane "$CACHE_LANE" \
            --mode docker \
            --adapter oci \
            --project-repo "$PROJECT_REPO" \
            --project-ref "${{ steps.upstream_ref.outputs.sha }}" \
            --cold-seconds "${{ steps.normalize.outputs.cold_seconds }}" \
            --cold-build-seconds "${{ steps.normalize.outputs.cold_build_seconds }}" \
            --warm1-seconds "${{ steps.normalize.outputs.warm1_seconds }}" \
            --warm1-build-seconds "${{ steps.normalize.outputs.warm1_build_seconds }}" \
            --cache-import-status "${{ steps.normalize.outputs.cache_import_status }}" \
            --docker-cache-import-seconds "${{ steps.normalize.outputs.docker_cache_import_seconds }}" \
            --docker-cache-export-seconds "${{ steps.normalize.outputs.docker_cache_export_seconds }}" \
            --buildkit-cached-steps "${{ steps.normalize.outputs.buildkit_cached_steps }}" \
            --cache-storage-bytes "${{ steps.normalize.outputs.cache_storage_bytes }}" \
            --cache-storage-source "${{ steps.normalize.outputs.cache_storage_source }}" \
            --storage-breakdown-json "${{ steps.normalize.outputs.cache_storage_breakdown_json }}" \
            --bytes-uploaded "${{ steps.normalize.outputs.bytes_uploaded }}" \
            --oci-hydration-policy "${{ steps.normalize.outputs.oci_hydration_policy }}" \
            --oci-body-local-hits "${{ steps.normalize.outputs.oci_body_local_hits }}" \
            --oci-body-remote-fetches "${{ steps.normalize.outputs.oci_body_remote_fetches }}" \
            --oci-body-local-bytes "${{ steps.normalize.outputs.oci_body_local_bytes }}" \
            --oci-body-remote-bytes "${{ steps.normalize.outputs.oci_body_remote_bytes }}" \
            --oci-body-local-duration-ms "${{ steps.normalize.outputs.oci_body_local_duration_ms }}" \
            --oci-body-remote-duration-ms "${{ steps.normalize.outputs.oci_body_remote_duration_ms }}" \
            --startup-oci-body-inserted "${{ steps.normalize.outputs.startup_oci_body_inserted }}" \
            --startup-oci-body-failures "${{ steps.normalize.outputs.startup_oci_body_failures }}" \
            --startup-oci-body-cold-blobs "${{ steps.normalize.outputs.startup_oci_body_cold_blobs }}" \
            --startup-oci-body-duration-ms "${{ steps.normalize.outputs.startup_oci_body_duration_ms }}" \
            --oci-new-blob-count "${{ steps.normalize.outputs.oci_new_blob_count }}" \
            --oci-new-blob-bytes "${{ steps.normalize.outputs.oci_new_blob_bytes }}" \
            --oci-upload-requested-blobs "${{ steps.normalize.outputs.oci_upload_requested_blobs }}" \
            --oci-upload-already-present "${{ steps.normalize.outputs.oci_upload_already_present }}" \
            --oci-upload-batch-seconds "${{ steps.normalize.outputs.oci_upload_batch_seconds }}" \
            --reseed-new-blob-threshold "0" \
            --hit-behavior-note "${{ steps.normalize.outputs.hit_behavior_note }}" \
            "${cache_summary_args[@]}" \
            "${native_tool_args[@]}"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ inputs.benchmark_id }}-${{ inputs.strategy }}-${{ inputs.cache_lane }}
          path: |
            ${{ steps.artifact_files.outputs.json_path }}
            ${{ steps.artifact_files.outputs.md_path }}
          if-no-files-found: error

      - name: Publish summary
        run: cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Storage comparison with GitHub Actions Cache
        if: inputs.strategy == 'boringcache' && always() && steps.bc_cache_size.outputs.bytes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bc_bytes="${{ steps.bc_cache_size.outputs.bytes }}"

          # Query GitHub Actions Cache usage for this repo
          gha_bytes="$(gh api "repos/${GITHUB_REPOSITORY}/actions/cache/usage" --jq '.active_caches_size_in_bytes' 2>/dev/null)" || {
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_Storage comparison skipped (GitHub Actions Cache API unreachable)_" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          }

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Storage comparison" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache | Storage | Notes |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| BoringCache | $(numfmt --to=iec-i --suffix=B "${bc_bytes}") | ${{ inputs.benchmark_id }} benchmark tags (content-addressed, deduped across branches) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub Actions | $(numfmt --to=iec-i --suffix=B "${gha_bytes}") | Repo total (buildkit blobs shared across projects, no cross-branch dedup) |" >> "$GITHUB_STEP_SUMMARY"
