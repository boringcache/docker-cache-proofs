name: Tool Cache Proof
run-name: >-
  ${{ format('{0} | {1} | {2}', inputs.case_id, inputs.ref_key, inputs.cache_lane) }}

on:
  workflow_dispatch:
    inputs:
      case_id:
        description: Tool cache case to run
        required: true
        type: choice
        options:
          - aranya-rust
          - besu-gradle
          - josh-rust-container
          - kvrocks-cpp-sccache
          - therock-prim-sccache
          - tiny-congress-rust
          - z3wire-bazel-devcontainer
      ref_key:
        description: Pinned case ref
        required: true
        type: string
        default: main
      cache_lane:
        description: Benchmark lane
        required: true
        type: choice
        default: fresh
        options:
          - fresh
          - rolling

permissions:
  contents: read
  actions: write

jobs:
  boringcache-rust-sccache:
    name: BC / sccache
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BENCHMARK_WORKSPACE: boringcache/docker-cache-proof
      CACHE_LANE: ${{ inputs.cache_lane }}
    steps:
      - name: Checkout proof repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Resolve tool case
        id: case
        run: ./scripts/emit-tool-case-outputs.sh "${{ inputs.case_id }}" "${{ inputs.ref_key }}"

      - name: Skip non-Rust adapter
        if: steps.case.outputs.adapter != 'rust-sccache' && steps.case.outputs.adapter != 'rust-sccache-container'
        run: echo "Rust/sccache job skipped for adapter ${{ steps.case.outputs.adapter }}"

      - name: Free disk space
        if: (steps.case.outputs.adapter == 'rust-sccache' || steps.case.outputs.adapter == 'rust-sccache-container') && steps.case.outputs.free_disk_space == 'true'
        run: |
          required_gb="${BORINGCACHE_MIN_FREE_DISK_GB:-45}"
          available_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
          required_kb=$((required_gb * 1024 * 1024))
          if (( available_kb >= required_kb )); then
            echo "Free disk is already at least ${required_gb}GiB; skipping cleanup."
            df -h /
            docker system df || true
            exit 0
          fi
          echo "Free disk below ${required_gb}GiB; reclaiming hosted-runner tool caches."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: Prepare pinned source tree
        if: steps.case.outputs.adapter == 'rust-sccache' || steps.case.outputs.adapter == 'rust-sccache-container'
        run: ./scripts/prepare-tool-case-source.sh "${{ inputs.case_id }}" "${{ inputs.ref_key }}"

      - name: Prepare benchmark scope
        if: steps.case.outputs.adapter == 'rust-sccache' || steps.case.outputs.adapter == 'rust-sccache-container'
        id: scope
        run: |
          set -euo pipefail
          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          ref_slug="${ref_slug#-}"
          ref_slug="${ref_slug%-}"
          ref_slug="${ref_slug:-main}"
          if [[ "${CACHE_LANE}" == "rolling" ]]; then
            cache_tag="${{ steps.case.outputs.cache_id }}-rolling-${ref_slug}-${{ inputs.case_id }}"
          else
            cache_tag="${{ steps.case.outputs.cache_id }}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          fi
          echo "cache_tag=${cache_tag}" >> "$GITHUB_OUTPUT"
          echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Validate BoringCache secrets
        if: steps.case.outputs.adapter == 'rust-sccache' || steps.case.outputs.adapter == 'rust-sccache-container'
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ env.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ env.BORINGCACHE_SAVE_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "${BORINGCACHE_RESTORE_TOKEN}" ]] || { echo "Missing BORINGCACHE_RESTORE_TOKEN secret" >&2; exit 1; }
          [[ -n "${BORINGCACHE_SAVE_TOKEN}" ]] || { echo "Missing BORINGCACHE_SAVE_TOKEN secret" >&2; exit 1; }

      - name: Configure boringcache/one for Rust sccache
        if: steps.case.outputs.adapter == 'rust-sccache' || steps.case.outputs.adapter == 'rust-sccache-container'
        id: bc
        uses: boringcache/one@v1
        with:
          setup: mise
          mode: rust-sccache
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: ${{ steps.case.outputs.source_path }}/${{ steps.case.outputs.working_directory }}
          cache-tag: ${{ steps.scope.outputs.cache_tag }}
          cache-cargo: true
          cache-target: false
          tools: rust@${{ steps.case.outputs.rust_toolchain }}
          sccache: true
          sccache-mode: proxy
          sccache-version: 0.14.0
          proxy-port: 5000
          cache-runtime: false
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ env.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ env.BORINGCACHE_SAVE_TOKEN }}
          BORINGCACHE_PROXY_METADATA_HINTS: benchmark=${{ steps.case.outputs.benchmark_id }},phase=${{ inputs.cache_lane == 'rolling' && 'commit' || 'cold' }},adapter=sccache

      - name: Run case setup
        if: steps.case.outputs.adapter == 'rust-sccache' || steps.case.outputs.adapter == 'rust-sccache-container'
        env:
          SOURCE_PATH: ${{ steps.case.outputs.source_path }}
          TOOL_WORKING_DIRECTORY: ${{ steps.case.outputs.working_directory }}
          TOOL_SETUP_APT_PACKAGES: ${{ steps.case.outputs.setup_apt_packages }}
          TOOL_SETUP_COMMANDS: ${{ steps.case.outputs.setup_commands }}
        run: ./scripts/run-tool-case-setup.sh

      - name: Run measured Rust/sccache command
        if: steps.case.outputs.adapter == 'rust-sccache' || steps.case.outputs.adapter == 'rust-sccache-container'
        id: measured
        env:
          SOURCE_PATH: ${{ steps.case.outputs.source_path }}
          TOOL_WORKING_DIRECTORY: ${{ steps.case.outputs.working_directory }}
          TOOL_BUILD_COMMAND: ${{ steps.case.outputs.measured_command }}
          BENCHMARK_METRICS_OUTPUT: ${{ runner.temp }}/tool-proof-metrics.env
          BENCHMARK_SCCACHE_STATS_FILE: benchmark-native-tool/sccache-stats.txt
          BENCHMARK_SCCACHE_STATS_SOURCE: ${{ steps.case.outputs.sccache_stats_source }}
        run: |
          set +e
          ./scripts/run-rust-sccache-proof.sh
          status="$?"
          set -e
          build_seconds="$(grep '^build_seconds=' "$RUNNER_TEMP/tool-proof-metrics.env" 2>/dev/null | tail -n1 | cut -d= -f2 || true)"
          build_seconds="${build_seconds:-0}"
          finished_at="$(date +%s)"
          total_seconds="$((finished_at - ${{ steps.scope.outputs.started_at }}))"
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "build_seconds=${build_seconds}" >> "$GITHUB_OUTPUT"
          echo "total_seconds=${total_seconds}" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Write benchmark artifacts
        if: always() && (steps.case.outputs.adapter == 'rust-sccache' || steps.case.outputs.adapter == 'rust-sccache-container')
        run: |
          set -euo pipefail
          mkdir -p benchmark-results
          native_tool_args=()
          if [[ -s benchmark-native-tool/sccache-stats.txt ]]; then
            native_tool_args=(--native-tool sccache --sccache-stats-file benchmark-native-tool/sccache-stats.txt)
          fi
          started_at="${{ steps.scope.outputs.started_at }}"
          started_at="${started_at:-$(date +%s)}"
          cold_seconds="${{ steps.measured.outputs.total_seconds }}"
          cold_build_seconds="${{ steps.measured.outputs.build_seconds }}"
          if [[ -z "$cold_seconds" ]]; then
            cold_seconds="$(($(date +%s) - started_at))"
          fi
          cold_build_seconds="${cold_build_seconds:-0}"
          save_result="skipped-build-failed"
          if [[ "${{ steps.measured.outputs.status }}" == "0" ]]; then
            save_result="attempted"
          fi
          ./scripts/write-benchmark-artifacts.sh \
            --benchmark "${{ steps.case.outputs.benchmark_id }}" \
            --strategy boringcache \
            --lane "${{ inputs.cache_lane }}" \
            --project-repo "${{ steps.case.outputs.project_repo }}" \
            --project-ref "${{ steps.case.outputs.project_ref }}" \
            --cold-seconds "$cold_seconds" \
            --cold-build-seconds "$cold_build_seconds" \
            --cache-storage-bytes "0" \
            --cache-storage-source "not-probed" \
            --hit-behavior-note "Rust/sccache prospect proof. Pain: ${{ steps.case.outputs.pain_url }}. Upstream run: ${{ steps.case.outputs.evidence_run }}. Readiness: ${{ steps.case.outputs.readiness }}." \
            --workspace "${BENCHMARK_WORKSPACE}" \
            --cache-tag "${{ steps.scope.outputs.cache_tag }}" \
            --mode rust-sccache \
            --adapter sccache \
            --restore-result "${{ steps.bc.outputs.sccache-hit }}" \
            --save-result "$save_result" \
            --output-dir benchmark-results \
            "${native_tool_args[@]}"

      - name: Upload benchmark results
        if: always() && (steps.case.outputs.adapter == 'rust-sccache' || steps.case.outputs.adapter == 'rust-sccache-container')
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ steps.case.outputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
          path: benchmark-results/
          if-no-files-found: error

      - name: Upload native tool stats
        if: always() && (steps.case.outputs.adapter == 'rust-sccache' || steps.case.outputs.adapter == 'rust-sccache-container')
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-native-tool-${{ steps.case.outputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
          path: benchmark-native-tool/
          if-no-files-found: ignore

  boringcache-cpp-sccache:
    name: BC / C++ sccache
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BENCHMARK_WORKSPACE: boringcache/docker-cache-proof
      CACHE_LANE: ${{ inputs.cache_lane }}
    steps:
      - name: Checkout proof repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Resolve tool case
        id: case
        run: ./scripts/emit-tool-case-outputs.sh "${{ inputs.case_id }}" "${{ inputs.ref_key }}"

      - name: Skip non-C++ sccache adapter
        if: steps.case.outputs.adapter != 'cpp-sccache'
        run: echo "C++/sccache job skipped for adapter ${{ steps.case.outputs.adapter }}"

      - name: Free disk space
        if: steps.case.outputs.adapter == 'cpp-sccache' && steps.case.outputs.free_disk_space == 'true'
        run: |
          required_gb="${BORINGCACHE_MIN_FREE_DISK_GB:-45}"
          available_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
          required_kb=$((required_gb * 1024 * 1024))
          if (( available_kb >= required_kb )); then
            echo "Free disk is already at least ${required_gb}GiB; skipping cleanup."
            df -h /
            docker system df || true
            exit 0
          fi
          echo "Free disk below ${required_gb}GiB; reclaiming hosted-runner tool caches."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: Prepare pinned source tree
        if: steps.case.outputs.adapter == 'cpp-sccache'
        run: ./scripts/prepare-tool-case-source.sh "${{ inputs.case_id }}" "${{ inputs.ref_key }}"

      - name: Set up Go for integration tests
        if: steps.case.outputs.adapter == 'cpp-sccache' && steps.case.outputs.go_version_file != ''
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ steps.case.outputs.source_path }}/${{ steps.case.outputs.go_version_file }}
          cache: false

      - name: Prepare benchmark scope
        if: steps.case.outputs.adapter == 'cpp-sccache'
        id: scope
        run: |
          set -euo pipefail
          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          ref_slug="${ref_slug#-}"
          ref_slug="${ref_slug%-}"
          ref_slug="${ref_slug:-main}"
          if [[ "${CACHE_LANE}" == "rolling" ]]; then
            cache_tag="${{ steps.case.outputs.cache_id }}-rolling-${ref_slug}-${{ inputs.case_id }}"
          else
            cache_tag="${{ steps.case.outputs.cache_id }}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          fi
          echo "cache_tag=${cache_tag}" >> "$GITHUB_OUTPUT"
          echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Validate BoringCache secrets
        if: steps.case.outputs.adapter == 'cpp-sccache'
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ env.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ env.BORINGCACHE_SAVE_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "${BORINGCACHE_RESTORE_TOKEN}" ]] || { echo "Missing BORINGCACHE_RESTORE_TOKEN secret" >&2; exit 1; }
          [[ -n "${BORINGCACHE_SAVE_TOKEN}" ]] || { echo "Missing BORINGCACHE_SAVE_TOKEN secret" >&2; exit 1; }

      - name: Configure boringcache/one for C++ sccache
        if: steps.case.outputs.adapter == 'cpp-sccache'
        id: bc
        uses: boringcache/one@v1
        with:
          setup: none
          mode: rust-sccache
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: ${{ steps.case.outputs.source_path }}/${{ steps.case.outputs.working_directory }}
          cache-tag: ${{ steps.scope.outputs.cache_tag }}
          cache-cargo: false
          cache-target: false
          sccache: true
          sccache-mode: proxy
          sccache-version: 0.14.0
          proxy-port: 5000
          cache-runtime: false
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ env.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ env.BORINGCACHE_SAVE_TOKEN }}
          BORINGCACHE_PROXY_METADATA_HINTS: benchmark=${{ steps.case.outputs.benchmark_id }},phase=${{ inputs.cache_lane == 'rolling' && 'commit' || 'cold' }},adapter=sccache

      - name: Run case setup
        if: steps.case.outputs.adapter == 'cpp-sccache'
        env:
          SOURCE_PATH: ${{ steps.case.outputs.source_path }}
          TOOL_WORKING_DIRECTORY: ${{ steps.case.outputs.working_directory }}
          TOOL_SETUP_APT_PACKAGES: ${{ steps.case.outputs.setup_apt_packages }}
          TOOL_SETUP_COMMANDS: ${{ steps.case.outputs.setup_commands }}
        run: ./scripts/run-tool-case-setup.sh

      - name: Run measured C++/sccache command
        if: steps.case.outputs.adapter == 'cpp-sccache'
        id: measured
        env:
          SOURCE_PATH: ${{ steps.case.outputs.source_path }}
          TOOL_WORKING_DIRECTORY: ${{ steps.case.outputs.working_directory }}
          TOOL_BUILD_COMMAND: ${{ steps.case.outputs.measured_command }}
          BENCHMARK_METRICS_OUTPUT: ${{ runner.temp }}/tool-proof-metrics.env
          BENCHMARK_SCCACHE_STATS_FILE: benchmark-native-tool/sccache-stats.txt
          BENCHMARK_SCCACHE_STATS_SOURCE: ${{ steps.case.outputs.sccache_stats_source }}
        run: |
          set +e
          ./scripts/run-rust-sccache-proof.sh
          status="$?"
          set -e
          build_seconds="$(grep '^build_seconds=' "$RUNNER_TEMP/tool-proof-metrics.env" 2>/dev/null | tail -n1 | cut -d= -f2 || true)"
          build_seconds="${build_seconds:-0}"
          finished_at="$(date +%s)"
          total_seconds="$((finished_at - ${{ steps.scope.outputs.started_at }}))"
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "build_seconds=${build_seconds}" >> "$GITHUB_OUTPUT"
          echo "total_seconds=${total_seconds}" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Write benchmark artifacts
        if: always() && steps.case.outputs.adapter == 'cpp-sccache'
        run: |
          set -euo pipefail
          mkdir -p benchmark-results
          native_tool_args=()
          if [[ -s benchmark-native-tool/sccache-stats.txt ]]; then
            native_tool_args=(--native-tool sccache --sccache-stats-file benchmark-native-tool/sccache-stats.txt)
          fi
          started_at="${{ steps.scope.outputs.started_at }}"
          started_at="${started_at:-$(date +%s)}"
          cold_seconds="${{ steps.measured.outputs.total_seconds }}"
          cold_build_seconds="${{ steps.measured.outputs.build_seconds }}"
          if [[ -z "$cold_seconds" ]]; then
            cold_seconds="$(($(date +%s) - started_at))"
          fi
          cold_build_seconds="${cold_build_seconds:-0}"
          save_result="skipped-build-failed"
          if [[ "${{ steps.measured.outputs.status }}" == "0" ]]; then
            save_result="attempted"
          fi
          ./scripts/write-benchmark-artifacts.sh \
            --benchmark "${{ steps.case.outputs.benchmark_id }}" \
            --strategy boringcache \
            --lane "${{ inputs.cache_lane }}" \
            --project-repo "${{ steps.case.outputs.project_repo }}" \
            --project-ref "${{ steps.case.outputs.project_ref }}" \
            --cold-seconds "$cold_seconds" \
            --cold-build-seconds "$cold_build_seconds" \
            --cache-storage-bytes "0" \
            --cache-storage-source "not-probed" \
            --hit-behavior-note "C++/sccache prospect proof. Pain: ${{ steps.case.outputs.pain_url }}. Upstream run: ${{ steps.case.outputs.evidence_run }}. Readiness: ${{ steps.case.outputs.readiness }}. Non-compiler-cache setup and test/runtime work remains as the honest tail." \
            --workspace "${BENCHMARK_WORKSPACE}" \
            --cache-tag "${{ steps.scope.outputs.cache_tag }}" \
            --mode sccache \
            --adapter sccache \
            --restore-result "${{ steps.bc.outputs.sccache-hit }}" \
            --save-result "$save_result" \
            --output-dir benchmark-results \
            "${native_tool_args[@]}"

      - name: Upload benchmark results
        if: always() && steps.case.outputs.adapter == 'cpp-sccache'
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ steps.case.outputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
          path: benchmark-results/
          if-no-files-found: error

      - name: Upload native tool stats
        if: always() && steps.case.outputs.adapter == 'cpp-sccache'
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-native-tool-${{ steps.case.outputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
          path: benchmark-native-tool/
          if-no-files-found: ignore

  boringcache-gradle:
    name: BC / Gradle
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BENCHMARK_WORKSPACE: boringcache/docker-cache-proof
      CACHE_LANE: ${{ inputs.cache_lane }}
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home
    steps:
      - name: Checkout proof repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Resolve tool case
        id: case
        run: ./scripts/emit-tool-case-outputs.sh "${{ inputs.case_id }}" "${{ inputs.ref_key }}"

      - name: Skip non-Gradle adapter
        if: steps.case.outputs.adapter != 'gradle'
        run: echo "Gradle job skipped for adapter ${{ steps.case.outputs.adapter }}"

      - name: Prepare pinned source tree
        if: steps.case.outputs.adapter == 'gradle'
        run: ./scripts/prepare-tool-case-source.sh "${{ inputs.case_id }}" "${{ inputs.ref_key }}"

      - name: Setup Java runtime
        if: steps.case.outputs.adapter == 'gradle'
        uses: actions/setup-java@v5
        with:
          distribution: ${{ steps.case.outputs.java_distribution }}
          java-version: ${{ steps.case.outputs.java_version }}

      - name: Prepare benchmark scope
        if: steps.case.outputs.adapter == 'gradle'
        id: scope
        run: |
          set -euo pipefail
          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          ref_slug="${ref_slug#-}"
          ref_slug="${ref_slug%-}"
          ref_slug="${ref_slug:-main}"
          if [[ "${CACHE_LANE}" == "rolling" ]]; then
            cache_tag="${{ steps.case.outputs.cache_id }}-rolling-${ref_slug}-${{ inputs.case_id }}-gradle"
          else
            cache_tag="${{ steps.case.outputs.cache_id }}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}-gradle"
          fi
          echo "cache_tag=${cache_tag}" >> "$GITHUB_OUTPUT"
          echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Validate BoringCache secrets
        if: steps.case.outputs.adapter == 'gradle'
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ env.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ env.BORINGCACHE_SAVE_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "${BORINGCACHE_RESTORE_TOKEN}" ]] || { echo "Missing BORINGCACHE_RESTORE_TOKEN secret" >&2; exit 1; }
          [[ -n "${BORINGCACHE_SAVE_TOKEN}" ]] || { echo "Missing BORINGCACHE_SAVE_TOKEN secret" >&2; exit 1; }

      - name: Configure boringcache/one for Gradle
        if: steps.case.outputs.adapter == 'gradle'
        id: bc
        uses: boringcache/one@v1
        with:
          setup: none
          mode: gradle
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: ${{ steps.case.outputs.source_path }}/${{ steps.case.outputs.working_directory }}
          cache-tag: ${{ steps.scope.outputs.cache_tag }}
          gradle-home: ${{ env.GRADLE_USER_HOME }}
          proxy-no-git: 'true'
          proxy-no-platform: 'true'
          verify: wait
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ env.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ env.BORINGCACHE_SAVE_TOKEN }}
          BORINGCACHE_PROXY_METADATA_HINTS: benchmark=${{ steps.case.outputs.benchmark_id }},phase=${{ inputs.cache_lane == 'rolling' && 'commit' || 'cold' }},adapter=gradle

      - name: Run case setup
        if: steps.case.outputs.adapter == 'gradle'
        env:
          SOURCE_PATH: ${{ steps.case.outputs.source_path }}
          TOOL_WORKING_DIRECTORY: ${{ steps.case.outputs.working_directory }}
          TOOL_SETUP_APT_PACKAGES: ${{ steps.case.outputs.setup_apt_packages }}
          TOOL_SETUP_COMMANDS: ${{ steps.case.outputs.setup_commands }}
        run: ./scripts/run-tool-case-setup.sh

      - name: Run measured Gradle command
        if: steps.case.outputs.adapter == 'gradle'
        id: measured
        env:
          SOURCE_PATH: ${{ steps.case.outputs.source_path }}
          TOOL_WORKING_DIRECTORY: ${{ steps.case.outputs.working_directory }}
          TOOL_BUILD_COMMAND: ${{ steps.case.outputs.measured_command }}
        run: |
          set +e
          mkdir -p benchmark-native-tool
          workdir="${SOURCE_PATH%/}/${TOOL_WORKING_DIRECTORY#./}"
          if [[ "${TOOL_WORKING_DIRECTORY}" == "." ]]; then
            workdir="${SOURCE_PATH%/}"
          fi
          started_at="$(date +%s)"
          (
            cd "$workdir"
            bash -euo pipefail -c "$TOOL_BUILD_COMMAND"
          ) 2>&1 | tee benchmark-native-tool/gradle.log
          status="${PIPESTATUS[0]}"
          finished_at="$(date +%s)"
          set -e
          build_seconds="$((finished_at - started_at))"
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "build_seconds=${build_seconds}" >> "$GITHUB_OUTPUT"
          echo "total_seconds=$((finished_at - ${{ steps.scope.outputs.started_at }}))" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Parse Gradle task outcome
        if: always() && steps.case.outputs.adapter == 'gradle'
        id: gradle_outcome
        run: ./scripts/parse-gradle-task-outcome.sh benchmark-native-tool/gradle.log commit

      - name: Write Gradle task evidence
        if: always() && steps.case.outputs.adapter == 'gradle'
        id: tool_outcomes
        env:
          OUTCOME_SUMMARY: ${{ steps.gradle_outcome.outputs.summary }}
          ACTIONABLE_TASKS: ${{ steps.gradle_outcome.outputs.actionable_tasks }}
          EXECUTED_TASKS: ${{ steps.gradle_outcome.outputs.executed_tasks }}
          FROM_CACHE_TASKS: ${{ steps.gradle_outcome.outputs.from_cache_tasks }}
          UP_TO_DATE_TASKS: ${{ steps.gradle_outcome.outputs.up_to_date_tasks }}
          OUTCOME_WARNING: ${{ steps.gradle_outcome.outputs.warning }}
        run: |
          set -euo pipefail
          mkdir -p benchmark-results
          json_string_or_null() {
            if [[ -z "$1" ]]; then
              echo "null"
            else
              jq -Rn --arg value "$1" '$value'
            fi
          }
          num_or_null() {
            if [[ "$1" =~ ^[0-9]+$ ]]; then
              printf '%s\n' "$1"
            else
              echo "null"
            fi
          }
          warnings_json="$(printf '%s\n' "$OUTCOME_WARNING" | jq -R -s 'split("\n") | map(select(length > 0)) | unique')"
          cat > benchmark-results/tool-outcomes.json <<JSON
          {
            "gradle": {
              "local_build_cache_policy": "remote",
              "commit": {
                "summary": $(json_string_or_null "$OUTCOME_SUMMARY"),
                "actionable_tasks": $(num_or_null "$ACTIONABLE_TASKS"),
                "executed_tasks": $(num_or_null "$EXECUTED_TASKS"),
                "from_cache_tasks": $(num_or_null "$FROM_CACHE_TASKS"),
                "up_to_date_tasks": $(num_or_null "$UP_TO_DATE_TASKS")
              }
            },
            "warnings": ${warnings_json}
          }
          JSON
          jq -c '.' benchmark-results/tool-outcomes.json >/dev/null
          echo "path=benchmark-results/tool-outcomes.json" >> "$GITHUB_OUTPUT"

      - name: Write benchmark artifacts
        if: always() && steps.case.outputs.adapter == 'gradle'
        run: |
          set -euo pipefail
          mkdir -p benchmark-results
          started_at="${{ steps.scope.outputs.started_at }}"
          started_at="${started_at:-$(date +%s)}"
          cold_seconds="${{ steps.measured.outputs.total_seconds }}"
          cold_build_seconds="${{ steps.measured.outputs.build_seconds }}"
          if [[ -z "$cold_seconds" ]]; then
            cold_seconds="$(($(date +%s) - started_at))"
          fi
          cold_build_seconds="${cold_build_seconds:-0}"
          save_result="skipped-build-failed"
          if [[ "${{ steps.measured.outputs.status }}" == "0" ]]; then
            save_result="attempted"
          fi
          tool_outcomes_args=()
          tool_outcomes_path="${{ steps.tool_outcomes.outputs.path }}"
          if [[ -n "$tool_outcomes_path" && -s "$tool_outcomes_path" ]]; then
            tool_outcomes_args=(--tool-outcomes-json "$tool_outcomes_path")
          fi
          ./scripts/write-benchmark-artifacts.sh \
            --benchmark "${{ steps.case.outputs.benchmark_id }}" \
            --strategy boringcache \
            --lane "${{ inputs.cache_lane }}" \
            --project-repo "${{ steps.case.outputs.project_repo }}" \
            --project-ref "${{ steps.case.outputs.project_ref }}" \
            --cold-seconds "$cold_seconds" \
            --cold-build-seconds "$cold_build_seconds" \
            --cache-storage-bytes "0" \
            --cache-storage-source "not-probed" \
            --hit-behavior-note "Gradle remote-cache prospect proof. Pain: ${{ steps.case.outputs.pain_url }}. Upstream run: ${{ steps.case.outputs.evidence_run }}. Readiness: ${{ steps.case.outputs.readiness }}." \
            --workspace "${BENCHMARK_WORKSPACE}" \
            --cache-tag "${{ steps.scope.outputs.cache_tag }}" \
            --mode gradle \
            --adapter gradle \
            --restore-result "${{ steps.bc.outputs.cache-hit }}" \
            --save-result "$save_result" \
            --output-dir benchmark-results \
            "${tool_outcomes_args[@]}"

      - name: Upload benchmark results
        if: always() && steps.case.outputs.adapter == 'gradle'
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ steps.case.outputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
          path: benchmark-results/
          if-no-files-found: error

      - name: Upload Gradle log
        if: always() && steps.case.outputs.adapter == 'gradle'
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-native-tool-${{ steps.case.outputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
          path: benchmark-native-tool/
          if-no-files-found: ignore

  boringcache-bazel-devcontainer:
    name: BC / Bazel devcontainer
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BENCHMARK_WORKSPACE: boringcache/docker-cache-proof
      CACHE_LANE: ${{ inputs.cache_lane }}
    steps:
      - name: Checkout proof repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Resolve tool case
        id: case
        run: ./scripts/emit-tool-case-outputs.sh "${{ inputs.case_id }}" "${{ inputs.ref_key }}"

      - name: Skip non-Bazel adapter
        if: steps.case.outputs.adapter != 'bazel-devcontainer'
        run: echo "Bazel devcontainer job skipped for adapter ${{ steps.case.outputs.adapter }}"

      - name: Free disk space
        if: steps.case.outputs.adapter == 'bazel-devcontainer' && steps.case.outputs.free_disk_space == 'true'
        run: |
          required_gb="${BORINGCACHE_MIN_FREE_DISK_GB:-45}"
          available_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
          required_kb=$((required_gb * 1024 * 1024))
          if (( available_kb >= required_kb )); then
            echo "Free disk is already at least ${required_gb}GiB; skipping cleanup."
            df -h /
            docker system df || true
            exit 0
          fi
          echo "Free disk below ${required_gb}GiB; reclaiming hosted-runner tool caches."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: Prepare pinned source tree
        if: steps.case.outputs.adapter == 'bazel-devcontainer'
        run: ./scripts/prepare-tool-case-source.sh "${{ inputs.case_id }}" "${{ inputs.ref_key }}"

      - name: Prepare benchmark scope
        if: steps.case.outputs.adapter == 'bazel-devcontainer'
        id: scope
        run: |
          set -euo pipefail
          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          ref_slug="${ref_slug#-}"
          ref_slug="${ref_slug%-}"
          ref_slug="${ref_slug:-main}"
          if [[ "${CACHE_LANE}" == "rolling" ]]; then
            cache_tag="${{ steps.case.outputs.cache_id }}-rolling-${ref_slug}-${{ inputs.case_id }}"
          else
            cache_tag="${{ steps.case.outputs.cache_id }}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          fi
          echo "cache_tag=${cache_tag}" >> "$GITHUB_OUTPUT"
          echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Validate BoringCache secrets
        if: steps.case.outputs.adapter == 'bazel-devcontainer'
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ env.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ env.BORINGCACHE_SAVE_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "${BORINGCACHE_RESTORE_TOKEN}" ]] || { echo "Missing BORINGCACHE_RESTORE_TOKEN secret" >&2; exit 1; }
          [[ -n "${BORINGCACHE_SAVE_TOKEN}" ]] || { echo "Missing BORINGCACHE_SAVE_TOKEN secret" >&2; exit 1; }

      - name: Configure boringcache/one for Bazel
        if: steps.case.outputs.adapter == 'bazel-devcontainer'
        id: bc
        uses: boringcache/one@v1
        with:
          setup: none
          mode: bazel
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: ${{ steps.case.outputs.source_path }}/${{ steps.case.outputs.working_directory }}
          cache-tag: ${{ steps.scope.outputs.cache_tag }}
          cache-runtime: false
          no-platform: true
          force: ${{ inputs.cache_lane == 'rolling' }}
          proxy-no-git: true
          proxy-no-platform: true
          proxy-port: 5000
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ env.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ env.BORINGCACHE_SAVE_TOKEN }}
          BORINGCACHE_PROXY_METADATA_HINTS: benchmark=${{ steps.case.outputs.benchmark_id }},phase=${{ inputs.cache_lane == 'rolling' && 'commit' || 'cold' }},adapter=bazel

      - name: Run case setup
        if: steps.case.outputs.adapter == 'bazel-devcontainer'
        env:
          SOURCE_PATH: ${{ steps.case.outputs.source_path }}
          TOOL_WORKING_DIRECTORY: ${{ steps.case.outputs.working_directory }}
          TOOL_SETUP_APT_PACKAGES: ${{ steps.case.outputs.setup_apt_packages }}
          TOOL_SETUP_COMMANDS: ${{ steps.case.outputs.setup_commands }}
        run: ./scripts/run-tool-case-setup.sh

      - name: Start measured Bazel command
        if: steps.case.outputs.adapter == 'bazel-devcontainer'
        id: measured_start
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run Bazel build inside devcontainer
        if: steps.case.outputs.adapter == 'bazel-devcontainer'
        id: bazel_build
        continue-on-error: true
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/qobilidop/z3wire-dev
          push: never
          runCmd: bash -lc 'bazel build --remote_cache=http://127.0.0.1:${{ steps.bc.outputs.proxy-port }} --bes_backend= --bes_results_url= //...'
          subFolder: ${{ steps.case.outputs.source_path }}/${{ steps.case.outputs.working_directory }}

      - name: Run Bazel test inside devcontainer
        if: steps.case.outputs.adapter == 'bazel-devcontainer' && steps.bazel_build.outcome == 'success'
        id: bazel_test
        continue-on-error: true
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/qobilidop/z3wire-dev
          push: never
          runCmd: bash -lc 'bazel test --remote_cache=http://127.0.0.1:${{ steps.bc.outputs.proxy-port }} --bes_backend= --bes_results_url= //...'
          subFolder: ${{ steps.case.outputs.source_path }}/${{ steps.case.outputs.working_directory }}

      - name: Finalize measured Bazel command
        if: always() && steps.case.outputs.adapter == 'bazel-devcontainer'
        id: measured
        run: |
          set -euo pipefail
          mkdir -p benchmark-native-tool
          build_status="${{ steps.bazel_build.outcome }}"
          test_status="${{ steps.bazel_test.outcome }}"
          if [[ "$build_status" == "success" && "$test_status" == "success" ]]; then
            status=0
          else
            status=1
          fi
          started_at="${{ steps.measured_start.outputs.started_at }}"
          started_at="${started_at:-$(date +%s)}"
          finished_at="$(date +%s)"
          build_seconds="$((finished_at - started_at))"
          printf 'build_status=%s\n' "$build_status" > benchmark-native-tool/bazel-devcontainer-status.env
          printf 'test_status=%s\n' "$test_status" >> benchmark-native-tool/bazel-devcontainer-status.env
          printf 'build_seconds=%s\n' "$build_seconds" >> benchmark-native-tool/bazel-devcontainer-status.env
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "build_seconds=${build_seconds}" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Write benchmark artifacts
        if: always() && steps.case.outputs.adapter == 'bazel-devcontainer'
        run: |
          set -euo pipefail
          mkdir -p benchmark-results
          started_at="${{ steps.scope.outputs.started_at }}"
          started_at="${started_at:-$(date +%s)}"
          cold_seconds="${{ steps.measured.outputs.build_seconds }}"
          cold_build_seconds="${{ steps.measured.outputs.build_seconds }}"
          if [[ -z "$cold_seconds" ]]; then
            cold_seconds="$(($(date +%s) - started_at))"
          fi
          cold_build_seconds="${cold_build_seconds:-0}"
          save_result="skipped-build-failed"
          if [[ "${{ steps.measured.outputs.status }}" == "0" ]]; then
            save_result="attempted"
          fi
          ./scripts/write-benchmark-artifacts.sh \
            --benchmark "${{ steps.case.outputs.benchmark_id }}" \
            --strategy boringcache \
            --lane "${{ inputs.cache_lane }}" \
            --project-repo "${{ steps.case.outputs.project_repo }}" \
            --project-ref "${{ steps.case.outputs.project_ref }}" \
            --cold-seconds "$cold_seconds" \
            --cold-build-seconds "$cold_build_seconds" \
            --cache-storage-bytes "0" \
            --cache-storage-source "not-probed" \
            --hit-behavior-note "Bazel/devcontainer prospect proof. Pain: ${{ steps.case.outputs.pain_url }}. Upstream run: ${{ steps.case.outputs.evidence_run }}. Readiness: ${{ steps.case.outputs.readiness }}." \
            --workspace "${BENCHMARK_WORKSPACE}" \
            --cache-tag "${{ steps.scope.outputs.cache_tag }}" \
            --mode bazel \
            --adapter bazel \
            --restore-result "${{ steps.bc.outputs.cache-hit }}" \
            --save-result "$save_result" \
            --output-dir benchmark-results

      - name: Upload benchmark results
        if: always() && steps.case.outputs.adapter == 'bazel-devcontainer'
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ steps.case.outputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
          path: benchmark-results/
          if-no-files-found: error

      - name: Upload native tool status
        if: always() && steps.case.outputs.adapter == 'bazel-devcontainer'
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-native-tool-${{ steps.case.outputs.benchmark_id }}-boringcache-${{ inputs.cache_lane }}
          path: benchmark-native-tool/
          if-no-files-found: ignore
